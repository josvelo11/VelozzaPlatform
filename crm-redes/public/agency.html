const TOKEN_KEY='crm_agency_token';
const AGENCY_ROLE_KEY='crm_agency_role';
const getToken=()=>localStorage.getItem(TOKEN_KEY);
const getAgencyRole=()=>localStorage.getItem(AGENCY_ROLE_KEY)||'owner';
const setToken=(t)=>t?localStorage.setItem(TOKEN_KEY,t):localStorage.removeItem(TOKEN_KEY);
async function apiFetch(path,{method='GET',body,clientId}={}){
  let url='/api/clientes'+path;
  if(clientId) url+=(url.includes('?')?'&':'?')+'clientId='+encodeURIComponent(clientId);
  const token=getToken();
  const role=getAgencyRole();
  const res=await fetch(url,{method,headers:{'Content-Type':'application/json',...(token?{Authorization:'Bearer '+token,'X-Agency-Role':role}:{})},body:body?JSON.stringify(body):undefined});
  const data=await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(data.error||'Error de conexión');
  return data;
}

function hashSeed(value){let h=7;for(const ch of String(value||''))h=(h*31+ch.charCodeAt(0))%100000;return h;}
function normalizeSocialHandle(value,platform){
  let v=String(value||'').trim();
  if(!v) return '';
  v=v.replace(/^https?:\/\/(www\.)?/i,'').replace(/\?.*$/,'').replace(/#.*$/,'').replace(/\/+$/,'');
  if(platform==='instagram') v=v.replace(/^instagram\.com\//i,'');
  if(platform==='facebook') v=v.replace(/^facebook\.com\//i,'');
  if(platform==='tiktok') v=v.replace(/^tiktok\.com\/@?/i,'');
  if(platform==='youtube') v=v.replace(/^youtube\.com\/(?:@|channel\/|c\/|user\/)?/i,'');
  if(platform==='linkedin') v=v.replace(/^linkedin\.com\/(?:company\/|in\/)?/i,'');
  if(platform==='x') v=v.replace(/^(?:x|twitter)\.com\//i,'');
  return v.replace(/^@/,'').trim();
}
function normalizeSocialLinksPayload(form){
  return Object.fromEntries(PKEYS.map((k)=>[k,normalizeSocialHandle(form?.[k],k)]));
}
function socialProfileUrl(platform,handle){
  const h=String(handle||'').trim();
  if(!h) return '';
  if(/^https?:\/\//i.test(h)) return h;
  return `${PLATFORMS[platform]?.base||''}${h}`;
}
function postPerformance(item){
  const base=hashSeed(item.id+item.title+item.date);
  const multiplier=Math.max(1,(item.platforms?.length||1));
  const impressions=350+(base%1700)*multiplier;
  const clicks=Math.max(5,Math.round(impressions*(0.01+((base%9)/1000))));
  const comments=Math.max(1,Math.round(clicks*(0.12+((base%4)/100))));
  const ctr=((clicks/impressions)*100).toFixed(1);
  return {impressions,clicks,comments,ctr};
}

/* ===== GRÁFICAS (SVG propias) (compartido con el portal) ===== */

function Donut({segments,size=150,thickness=20,center}){
  const total=segments.reduce((s,x)=>s+x.value,0)||1;const r=(size-thickness)/2,c=2*Math.PI*r;let off=0;
  return <div style={{position:'relative',width:size,height:size,flex:'0 0 auto'}}>
    <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#F1F0EB" strokeWidth={thickness}/>
    {segments.map((s,i)=>{const len=c*(s.value/total);const el=<circle key={i} cx={size/2} cy={size/2} r={r} fill="none" stroke={s.color} strokeWidth={thickness} strokeLinecap="butt" strokeDasharray={`${len} ${c-len}`} strokeDashoffset={-off} style={{transition:'all .6s'}}/>;off+=len;return el;})}</svg>
    {center&&<div style={{position:'absolute',inset:0,display:'grid',placeItems:'center',textAlign:'center'}}>{center}</div>}</div>;
}
function HBars({data}){const max=Math.max(...data.map(d=>d.value),1);
  return <div>{data.map((d,i)=>(<div className="bar-track" key={i}>
    <div className="bar-label">{d.badge}{d.label}</div>
    <div className="bar-rail"><div className="bar-val-fill" style={{'--brand':d.color,width:(d.value/max*100)+'%'}}/></div>
    <div className="bar-num">{d.display??d.value}</div></div>))}</div>;
}
function LineChart({points,height=190,color='#FF6B4A'}){
  if(!points||points.length<2) return null;
  const w=560,h=height,pad=30;const vals=points.map(p=>p.value);const max=Math.max(...vals),min=Math.min(...vals);const range=(max-min)||1;
  const X=i=>pad+(i/(points.length-1))*(w-pad*2);const Y=v=>h-pad-((v-min)/range)*(h-pad*2-6);
  const pts=points.map((p,i)=>`${X(i)},${Y(p.value)}`).join(' ');
  return <svg viewBox={`0 0 ${w} ${h}`} width="100%" preserveAspectRatio="none" style={{maxHeight:height}}>
    <defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.22"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
    <polygon points={`${pad},${h-pad} ${pts} ${w-pad},${h-pad}`} fill="url(#lg)"/>
    <polyline points={pts} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
    {points.map((p,i)=><circle key={i} cx={X(i)} cy={Y(p.value)} r="3.5" fill="#fff" stroke={color} strokeWidth="2"/>)}
    {points.map((p,i)=><text key={'t'+i} x={X(i)} y={h-9} fontSize="11" fill="#9A9AAB" textAnchor="middle" fontFamily="JetBrains Mono">{p.label}</text>)}
  </svg>;
}

function FormulaModal({onClose,onSave,initial,mode='create'}){
  const [f,setF]=useState(initial||{name:'Tasa de leads nuevos',op:'ratio',left:'newContactsThisMonth',right:'audienceTotal',multiplier:'100',decimals:'2'});
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  useEffect(()=>{if(initial){setF({
    ...initial,
    multiplier:String(initial.multiplier ?? 1),
    decimals:String(initial.decimals ?? 2),
  });}},[initial]);
  return <Modal title="Nueva formula" onClose={onClose}
    footer={<><button className="btn btn-ghost" onClick={onClose}>Cancelar</button><button className="btn btn-primary" onClick={()=>{if(!f.name){toastErr('Pon un nombre para la formula');return;}onSave({...f,multiplier:Number(f.multiplier||1),decimals:Number(f.decimals||2)});}}>{mode==='edit'?'Actualizar':'Guardar'}</button></>}>
    <div className="field"><label>Nombre</label><input className="input" value={f.name} onChange={e=>set('name',e.target.value)} placeholder="Ej. ROI comercial"/></div>
    <div className="grid" style={{gridTemplateColumns:'1fr 1fr 1fr'}}>
      <div className="field"><label>Operacion</label><select className="input" value={f.op} onChange={e=>set('op',e.target.value)}><option value="ratio">Division</option><option value="sum">Suma</option><option value="diff">Resta</option><option value="product">Producto</option></select></div>
      <div className="field"><label>Multiplicador</label><input className="input" type="number" value={f.multiplier} onChange={e=>set('multiplier',e.target.value)}/></div>
      <div className="field"><label>Decimales</label><input className="input" type="number" min="0" max="6" value={f.decimals} onChange={e=>set('decimals',e.target.value)}/></div>
    </div>
    <div className="grid" style={{gridTemplateColumns:'1fr 1fr'}}>
      <div className="field"><label>Campo A</label><select className="input" value={f.left} onChange={e=>set('left',e.target.value)}>{METRIC_FIELDS.map(m=><option key={m} value={m}>{m}</option>)}</select></div>
      <div className="field"><label>Campo B</label><select className="input" value={f.right} onChange={e=>set('right',e.target.value)}>{METRIC_FIELDS.map(m=><option key={m} value={m}>{m}</option>)}</select></div>
    </div>
  </Modal>;
}

function Analytics({metrics,content,formulas,onCreateFormula,onUpdateFormula,onDeleteFormula,canManageReports}){
  const [showFormulaModal,setShowFormulaModal]=useState(false);
  const [editing,setEditing]=useState(null);
  if(!metrics) return null;
  const reach=PKEYS.map(k=>({label:PLATFORMS[k].name,value:metrics.reachByPlatform?.[k]||0,color:PLATFORMS[k].color,display:fmtK(metrics.reachByPlatform?.[k]||0),badge:<span className="mini-badge" style={{'--brand':PLATFORMS[k].color,width:18,height:18,fontSize:9,border:'none'}}>{PLATFORMS[k].mono}</span>})).filter(r=>r.value>0);
  const cs=metrics.contentByStatus||{};
  const donut=[{label:'Aprobadas',value:cs.approved||0,color:'#19B98C'},{label:'Pendientes',value:cs.pending||0,color:'#F4A52C'},{label:'Borrador',value:cs.draft||0,color:'#9A9AAB'},{label:'Publicadas',value:cs.published||0,color:'#6C5CE7'}].filter(d=>d.value>0);
  const totalContent=donut.reduce((s,d)=>s+d.value,0);
  const lastFollowers=metrics.followerGrowth?.at(-1)?.value||0;const firstFollowers=metrics.followerGrowth?.[0]?.value||0;
  const growthPct=firstFollowers?Math.round((lastFollowers-firstFollowers)/firstFollowers*100):0;

    <div className="kpi-row">
      <KPI lbl="Seguidores totales" val={fmtK(lastFollowers)} ico={icons.share} c="var(--violet)" bg="rgba(108,92,231,.12)" trend={`+${growthPct}% 6 meses`}/>

      <KPI lbl="Apertura de email" val={metrics.openRate+'%'} ico={icons.mega} c="var(--mint)" bg="rgba(25,185,140,.12)" trend="campañas"/>
      <KPI lbl="Nuevos contactos" val={metrics.newContactsThisMonth} ico={icons.contacts} c="var(--amber)" bg="rgba(244,165,44,.15)" trend="este mes"/>
    </div>
    <div className="card card-pad"><div className="section-title" style={{marginBottom:6}}><Ico d={icons.chart} size={16}/>Crecimiento de seguidores</div>
      <p className="section-sub" style={{marginBottom:12}}>Suma de tus redes conectadas, últimos 6 meses.</p>
      <LineChart points={metrics.followerGrowth} color="#FF6B4A"/></div>
    <div className="chart-grid">
      <div className="card card-pad"><div className="section-title" style={{marginBottom:16}}><Ico d={icons.share} size={16}/>Alcance por red (mensual)</div>
        {reach.length?<HBars data={reach}/>:<p style={{fontSize:13,color:'var(--muted)'}}>Conecta redes para ver alcance.</p>}</div>
      <div className="card card-pad"><div className="section-title" style={{marginBottom:16}}><Ico d={icons.grid} size={16}/>Estado del contenido</div>
        <div style={{display:'flex',justifyContent:'center'}}><Donut segments={donut.length?donut:[{label:'—',value:1,color:'#F1F0EB'}]} center={<div><div style={{fontFamily:'var(--font-display)',fontSize:26,fontWeight:600}}>{totalContent}</div><div style={{fontSize:11,color:'var(--muted)'}}>piezas</div></div>}/></div>
        <div className="legend">{donut.map((d,i)=><div className="lg" key={i}><i style={{background:d.color}}/>{d.label} ({d.value})</div>)}</div></div>
    </div>
    <div className="card card-pad">
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}><div className="section-title"><Ico d={icons.plan} size={16}/>Formulas personalizadas</div>
        <button className="btn btn-primary btn-sm" style={{marginLeft:'auto'}} onClick={()=>setShowFormulaModal(true)} disabled={!canManageReports}><Ico d={icons.plus} size={14}/>Nueva formula</button>
      </div>
      {formulas?.length?<div className="grid" style={{gridTemplateColumns:'repeat(auto-fit, minmax(220px, 1fr))',gap:10}}>{formulas.map(f=><div key={f.id} className="card" style={{padding:12,border:'1px solid rgba(0,0,0,.08)'}}>
        <div style={{fontSize:12,color:'var(--muted-2)',marginBottom:6}}>{f.left} {f.op} {f.right}</div>
        <div style={{fontFamily:'var(--font-display)',fontSize:24,fontWeight:600,lineHeight:1.1}}>{Number(f.value||0).toLocaleString('es-CO')}</div>
        <div style={{fontSize:13,color:'var(--ink)',marginTop:4}}>{f.name}</div>
        <div style={{display:'flex',gap:6,marginTop:10}}>
          <button className="btn btn-ghost btn-sm" onClick={()=>setEditing(f)} disabled={!canManageReports}><Ico d={icons.edit} size={14}/>Editar</button>
          <button className="btn btn-ghost btn-sm" onClick={()=>onDeleteFormula(f)} disabled={!canManageReports}><Ico d={icons.trash} size={14}/>Eliminar</button>
        </div>
      </div>)}</div>:<p style={{fontSize:13,color:'var(--muted)'}}>Crea formulas para calcular indicadores compuestos sobre tus metricas.</p>}
    </div>
    {showFormulaModal&&canManageReports&&<FormulaModal onClose={()=>setShowFormulaModal(false)} onSave={async(payload)=>{await onCreateFormula(payload);setShowFormulaModal(false);}}/>}
    {editing&&canManageReports&&<FormulaModal mode="edit" initial={editing} onClose={()=>setEditing(null)} onSave={async(payload)=>{await onUpdateFormula(editing.id,payload);setEditing(null);}}/>}
  </div>);
}

    <div style={{display:'flex',justifyContent:'flex-end'}}><button className="btn btn-ghost btn-sm" onClick={onRefresh}>Actualizar lista</button></div>

  </div>);

function Pipeline({deals,contacts,onCreate,onMove,onDelete}){
  const[modal,setModal]=useState(false);
  const open=deals.filter(d=>d.stage!=='perdido');
  const total=open.filter(d=>d.stage!=='ganado').reduce((s,d)=>s+d.value,0);
  const idxOf=k=>STAGES.findIndex(s=>s.k===k);
  return (<div className="grid" style={{gap:16}}>
    <div style={{display:'flex',alignItems:'center',flexWrap:'wrap',gap:12}}>
      <div className="section-title"><Ico d={icons.funnel} size={16}/>Embudo de ventas</div>
      <span className="pill pill-mint" style={{fontFamily:'var(--font-mono)'}}>{fmtCOP(total)} en negociación</span>
      <button className="btn btn-primary btn-sm" style={{marginLeft:'auto'}} onClick={()=>setModal(true)}><Ico d={icons.plus} size={15}/>Nueva oportunidad</button></div>
    <div className="kanban">{STAGES.map((st,si)=>{const cards=open.filter(d=>d.stage===st.k);const colTotal=cards.reduce((s,d)=>s+d.value,0);
      return (<div className="kcol" key={st.k}>
        <div className="kcol-head"><div className="kt"><span className="kcol-stripe" style={{background:st.c}}/>{st.l}</div><span className="kc">{cards.length}</span></div>
        {cards.map(d=>(<div className="kcard" key={d.id}><div className="kc-title">{d.title}</div>{d.contact&&<div className="kc-contact">{d.contact}</div>}<div className="kc-val">{fmtCOP(d.value)}</div>
          <div className="kc-move"><button disabled={si===0} onClick={()=>onMove(d.id,STAGES[si-1].k)}>← Atrás</button><button disabled={si===STAGES.length-1} onClick={()=>onMove(d.id,STAGES[si+1].k)}>Avanzar →</button></div></div>))}
        <div className="kcol-total">{fmtCOP(colTotal)}</div></div>);})}</div>
    {modal&&<DealModal contacts={contacts} onClose={()=>setModal(false)} onSave={async(f)=>{await onCreate(f);setModal(false);}}/>}
  </div>);

const INBOX_CH={instagram:[PLATFORMS.instagram.hex,'◎'],facebook:[PLATFORMS.facebook.hex,'f'],whatsapp:['#25D366','✆'],email:['#6C5CE7','✉'],x:['#111','𝕏'],tiktok:['#111','♪']};
function Inbox({conversations,onReply,onRead,onToggleStatus}){
  const[sel,setSel]=useState(null);const[text,setText]=useState('');const bodyRef=useRef(null);
  const ordered=[...conversations].sort((a,b)=>(b.unread>0)-(a.unread>0));
  const current=conversations.find(c=>c.id===sel)||ordered[0]||null;
  useEffect(()=>{if(current&&current.id!==sel)setSel(current.id);},[conversations.length]);
  useEffect(()=>{if(bodyRef.current)bodyRef.current.scrollTop=bodyRef.current.scrollHeight;},[current?.messages?.length,sel]);
  const open=(c)=>{setSel(c.id);if(c.unread>0)onRead(c.id);};
  const send=()=>{const t=text.trim();if(!t||!current)return;onReply(current.id,t);setText('');};
  return (<div className="inbox">
    <div className="inbox-list">{ordered.map(c=>{const[col,gl]=INBOX_CH[c.channel]||INBOX_CH.email;const last=c.messages[c.messages.length-1];
      return (<div key={c.id} className={'conv'+(current&&c.id===current.id?' active':'')} onClick={()=>open(c)}>
        <div className="conv-av" style={{background:avatarColor(c.contactName)}}>{initialsOf(c.contactName)}<span className="conv-ch" style={{background:col}}>{gl}</span></div>
        <div className="conv-main"><div className="conv-top"><span className="conv-name">{c.contactName}</span><span className="conv-time">{c.updatedAt}</span></div>
          <div style={{display:'flex',alignItems:'center',gap:6}}><span className="conv-prev">{last?(last.from==='me'?'Tú: ':'')+last.text:''}</span>{c.unread>0&&<span className="conv-unread">{c.unread}</span>}</div></div></div>);})}
      {!conversations.length&&<div className="inbox-empty">Sin conversaciones aún.</div>}</div>
    {current?<div className="thread">
      <div className="thread-head"><div className="conv-av" style={{background:avatarColor(current.contactName),width:38,height:38}}>{initialsOf(current.contactName)}</div>
        <div style={{flex:1}}><div style={{fontWeight:600,fontSize:14}}>{current.contactName}</div><div style={{fontSize:11.5,color:'var(--muted)',textTransform:'capitalize'}}>{current.channel} · {current.status}</div></div>
        <button className="btn btn-ghost btn-sm" onClick={()=>onToggleStatus(current)}>{current.status==='abierta'?'Cerrar':'Reabrir'}</button></div>
      <div className="thread-body" ref={bodyRef}>{current.messages.map((m,i)=>(<div key={i} className={'tmsg '+(m.from==='me'?'me':'them')}>{m.text}<div className="tm-at">{m.at}</div></div>))}</div>
      <div className="thread-input"><input className="input" placeholder="Escribe una respuesta…" value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()}/><button className="btn btn-primary" onClick={send}><Ico d={icons.send} size={16}/></button></div>
    </div>:<div className="inbox-empty">Selecciona una conversación</div>}
  </div>);
}

function NewContent({onCreate,disabled,presetDate,openSignal}){
  const [open,setOpen]=useState(false);
  const [f,setF]=useState({title:'',caption:'',platforms:[],date:new Date().toISOString().slice(0,10),format:'flyer',mediaDataUrl:'',mediaName:''});
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const toggle=(p)=>setF(s=>({...s,platforms:s.platforms.includes(p)?s.platforms.filter(x=>x!==p):[...s.platforms,p]}));
  useEffect(()=>{
    if(!openSignal) return;
    setOpen(true);
    if(presetDate) setF(s=>({...s,date:presetDate}));
  },[openSignal,presetDate]);
  const fillWithAi=()=>{
    const main=f.platforms[0]||'instagram';
    const audience={instagram:'audiencia social',facebook:'comunidad local',tiktok:'audiencia joven',youtube:'suscriptores',linkedin:'tomadores de decision',x:'seguidores de actualidad'}[main]||'tu audiencia';
    if(!f.title) set('title',`Idea para ${PLATFORMS[main]?.name||'red social'} (${new Date(f.date).toLocaleDateString('es-CO')})`);
    set('caption',f.caption||`Hook: "${(f.title||'Esta semana tenemos algo nuevo').slice(0,50)}"\nBeneficio: explica en 1 frase por que le importa a ${audience}.\nCTA: invita a escribir por DM o reservar una llamada.`);
    toast('Borrador AI sugerido (editable)');
  };
  const onFile=async(file)=>{
    if(!file) return;
    const reader=new FileReader();
    reader.onload=()=>setF(s=>({...s,mediaDataUrl:String(reader.result||''),mediaName:file.name||'archivo'}));
    reader.readAsDataURL(file);
  };
  const submit=async()=>{ if(!f.title||!f.platforms.length){toastErr('Pon un título y al menos una red');return;}
    try{ await onCreate(f); setF({title:'',caption:'',platforms:[],date:new Date().toISOString().slice(0,10),format:'flyer',mediaDataUrl:'',mediaName:''}); setOpen(false); toast('Pieza enviada a la parrilla del cliente'); }catch(e){toastErr(e.message);} };
  if(!open) return <button className="btn btn-primary" onClick={()=>setOpen(true)} disabled={disabled}><Ico d={icons.plus} size={16}/>Nueva publicación</button>;
  return (<div className="card card-pad" style={{marginBottom:18}}>
    <div className="section-title" style={{marginBottom:14}}><Ico d={icons.plus} size={16}/>Crear publicación para la parrilla</div>
    <div className="grid" style={{gridTemplateColumns:'2fr 1fr',marginBottom:14}}>
      <div className="field"><label>Título</label><input className="input" value={f.title} onChange={e=>set('title',e.target.value)} placeholder="Ej. Promo fin de semana"/></div>
      <div className="field"><label>Fecha de publicación</label><input className="input" type="date" value={f.date} onChange={e=>set('date',e.target.value)}/></div></div>
    <div className="field" style={{marginBottom:14}}><label>Descripción / copy</label><textarea className="input" value={f.caption} onChange={e=>set('caption',e.target.value)} placeholder="Texto que acompaña la pieza…"/></div>
    <div className="grid" style={{gridTemplateColumns:'1fr 1fr',marginBottom:14}}>
      <div className="field"><label>Formato</label><select className="input" value={f.format} onChange={e=>set('format',e.target.value)}>{Object.entries(CONTENT_FORMATS).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select></div>
      <div className="field"><label>Archivo de publicación</label><input className="input" type="file" accept="image/*,video/*" onChange={e=>onFile(e.target.files?.[0])}/>{f.mediaName&&<div style={{fontSize:12,color:'var(--muted)',marginTop:4}}>Adjunto: {f.mediaName}</div>}</div>
    </div>
    <div className="field" style={{marginBottom:16}}><label>Redes destino</label>
      <div style={{display:'flex',gap:8,flexWrap:'wrap',marginTop:4}}>{PKEYS.map(k=>{const on=f.platforms.includes(k);
        return <button key={k} className={'platform-toggle'+(on?' on':'')} style={{'--brand':PLATFORMS[k].color}} onClick={()=>toggle(k)}>
          <span className="mini-badge" style={{'--brand':PLATFORMS[k].color,width:18,height:18,fontSize:9,border:'none'}}>{PLATFORMS[k].mono}</span>{PLATFORMS[k].name}{on&&' ✓'}</button>;})}</div></div>

function ImportContentModal({onClose,onImport,onPreview}){
  const [text,setText]=useState('title,caption,platforms,date\nPromo brunch,Descuento especial,instagram|facebook,2026-07-05');
  const [busy,setBusy]=useState(false);
  const [preview,setPreview]=useState(null);
  const [previewBusy,setPreviewBusy]=useState(false);
  const buildRows=()=>parseDelimited(text).map(row=>({
    title: row.title || row.titulo || '',
    caption: row.caption || row.descripcion || row.copy || '',
    platforms: row.platforms || row.redes || '',
    date: row.date || row.fecha || '',
    format: row.format || row.formato || 'flyer',
  }));
  const runPreview=async()=>{
    try{
      setPreviewBusy(true);
      setPreview(await onPreview(buildRows()));
    }catch(e){toastErr(e.message);}finally{setPreviewBusy(false);}
  };
  const submit=async()=>{
    const rows=buildRows();
    if(!rows.length){toastErr('No hay filas para importar');return;}
    try{
      setBusy(true);
      const result=await onImport(rows);
      toast(`Importadas ${result.created} piezas${result.errors?.length?` · ${result.errors.length} con error`:''}`);
      if(result.errors?.length) toastErr(result.errors.slice(0,3).map(e=>`Fila ${e.row}: ${e.error}`).join(' | '));
      onClose();
    }catch(e){toastErr(e.message);}finally{setBusy(false);}
  };
  return <Modal title="Importar parrilla por CSV" onClose={onClose}
    footer={<><button className="btn btn-ghost" onClick={onClose}>Cancelar</button><button className="btn btn-ghost" onClick={runPreview} disabled={previewBusy}>{previewBusy?'Validando...':'Previsualizar'}</button><button className="btn btn-primary" onClick={submit} disabled={busy}>{busy?'Importando...':'Importar'}</button></>}>
    <div className="field"><label>CSV: title, caption, platforms, date</label><textarea className="input" style={{minHeight:220,fontFamily:'var(--font-mono)'}} value={text} onChange={e=>setText(e.target.value)}/></div>
    <div style={{fontSize:12,color:'var(--muted)'}}>platforms acepta separadores | ; o , (ej: instagram|facebook).</div>
    {preview&&<div className="card" style={{padding:12,border:'1px solid rgba(0,0,0,.08)',marginTop:12}}>
      <div style={{fontWeight:600,marginBottom:8}}>Resumen de importación</div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:8}}>
        <span className="text-chip" style={{'--brand':'var(--mint)'}}>Validas: {preview.validRows}</span>
        <span className="text-chip" style={{'--brand':'var(--amber)'}}>Invalidas: {preview.invalidRows}</span>
        <span className="text-chip" style={{'--brand':'var(--violet)'}}>Total: {preview.totalRows}</span>
      </div>
      {preview.sample?.length>0&&<div style={{fontSize:12,color:'var(--muted)'}}>Ejemplos: {preview.sample.slice(0,3).map(s=>`${s.title} (${s.date})`).join(' · ')}</div>}
      {preview.errors?.length>0&&<div style={{fontSize:12,color:'var(--danger)',marginTop:6}}>Errores: {preview.errors.slice(0,3).map(e=>`Fila ${e.row}`).join(', ')}</div>}
    </div>}
  </Modal>;
}

function ClientContent({content,onCreate,onImport,onStatusChange,onUpdate,canWriteContent,canApproveContent}){

  const [composeDate,setComposeDate]=useState('');
  const [composeSignal,setComposeSignal]=useState(0);
  const pending=content.filter(c=>c.status==='pending');
  const sorted=[...content].sort((a,b)=>a.date.localeCompare(b.date));
  const canPublish=(c)=>c.status==='approved';
  const monthStart=new Date(calendarDate.getFullYear(),calendarDate.getMonth(),1);
  const monthEnd=new Date(calendarDate.getFullYear(),calendarDate.getMonth()+1,0);
  const firstWeekday=(monthStart.getDay()+6)%7;
  const totalDays=monthEnd.getDate();

    days.push({date:key,day:d,items:sorted.filter(item=>item.date===key)});

  };

    const nextYear=Math.min(2100,Math.max(2000,Number(year)||new Date().getFullYear()));

function parseDelimited(text){
  const clean=(text||'').trim().replace(/^\uFEFF/, '');
  if(!clean) return [];
  const lines=clean.split(/\r?\n/).filter(Boolean);
  const delimiter=lines[0].includes(';')&&!lines[0].includes(',')?';':',';
  const splitLine=(line)=>{
    const cells=[]; let current=''; let quoted=false;
    for(let i=0;i<line.length;i+=1){
      const ch=line[i];
      if(ch==='"'){
        if(quoted && line[i+1]==='"'){ current+='"'; i+=1; }
        else quoted=!quoted;
      }else if(ch===delimiter && !quoted){ cells.push(current.trim()); current=''; }
      else current+=ch;
    }
    cells.push(current.trim());
    return cells.map(cell=>cell.replace(/^"|"$/g,''));
  };
  const headers=splitLine(lines[0]).map(h=>h.trim().toLowerCase());
  return lines.slice(1).map(line=>{
    const cells=splitLine(line);
    const row={};
    headers.forEach((header,index)=>{row[header]=cells[index]||'';});
    return row;
  });
}

function toCsv(rows, headers){
  const esc=(value)=>`"${String(value ?? '').replace(/"/g,'""')}"`;
  return [headers.map(esc).join(','), ...rows.map(row=>headers.map(h=>esc(row[h])).join(','))].join('\n');
}

function downloadTextFile(filename, content, mime='text/plain;charset=utf-8'){
  const blob=new Blob([content],{type:mime});
  const url=URL.createObjectURL(blob);
  const link=document.createElement('a');
  link.href=url;
  link.download=filename;
  document.body.appendChild(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(url);
}

  const [text,setText]=useState('fullName,email,password,businessSector,phone,instagram,facebook,tiktok,youtube,linkedin,x,avatarUrl,planName,planPeriod,planTotal,planReels,planCarruseles,planFlyers\nNuevo Cliente,cliente@empresa.com,clave123,Restaurante,+57 300 000 0000,cliente,,,,,,Plan Inicial,Mes en curso,12,4,4,4' );

  const[activity,setActivity]=useState([]);
  const[createClientOpen,setCreateClientOpen]=useState(false);
  const[editClientOpen,setEditClientOpen]=useState(false);
  const[planClientOpen,setPlanClientOpen]=useState(false);
  const[importClientsOpen,setImportClientsOpen]=useState(false);
  const[exportDataOpen,setExportDataOpen]=useState(false);

  useEffect(()=>{(async()=>{if(getToken()){try{const u=await API.me();if(u.role==='agency')setUser(u);else setToken(null);}catch{setToken(null);}}setReady(true);})();},[]);
  useEffect(()=>{localStorage.setItem(AGENCY_ROLE_KEY,agencyRole);},[agencyRole]);
  const loadClients=async()=>{const list=await API.clients();setClients(list);if(list.length&&!sel)setSel(list[0].id);};
  useEffect(()=>{if(user)loadClients().catch(e=>toastErr(e.message));},[user]);
  const loadAgencyMetrics=async()=>{setAgencyMetrics(await API.agencyMetrics());};
  useEffect(()=>{if(user)loadAgencyMetrics().catch(()=>{});},[user]);
  const loadOpsMetrics=async()=>{setOpsMetrics(await API.agencyOps());};
  useEffect(()=>{if(user)loadOpsMetrics().catch(()=>{});},[user,agencyRole]);
  const loadCapabilities=async()=>{const data=await API.agencyCapabilities();setCapabilities(data.capabilities||{});};
  useEffect(()=>{if(user)loadCapabilities().catch(()=>{});},[user,agencyRole]);
  const loadTemplates=async()=>{setTemplates(await API.templates());};
  useEffect(()=>{if(user)loadTemplates().catch(()=>{});},[user,agencyRole]);
  const loadTemplateAssignments=async(cid)=>{if(!cid){setTemplateAssignments([]);return;}setTemplateAssignments(await API.templateAssignments(cid));};
  useEffect(()=>{if(user&&sel)loadTemplateAssignments(sel).catch(()=>{});},[user,sel,agencyRole]);
  const can=(cap)=>capabilities?.[cap]!==false;

  const loadClient=async(cid)=>{const[p,s,c,m,pl,mx,fm,ct,dl,tk,cp,cal,ap,au,cv,ac]=await Promise.all([API.profile(cid),API.socials(cid),API.content(cid),API.messages(cid),API.plan(cid),API.metrics(cid),API.formulas(cid),API.contacts(cid),API.deals(cid),API.tasks(cid),API.campaigns(cid),API.calendars(cid),API.appointments(cid),API.automations(cid),API.conversations(cid),API.activity(cid)]);
    setProfile(p);setSocials(s);setContent(c);setMessages(m);setPlan(pl);setMetrics(mx);setFormulas(fm);setContacts(ct);setDeals(dl);setTasks(tk);setCampaigns(cp);setCalendars(cal);setAppointments(ap);setAutomations(au);setConversations(cv);setActivity(ac);};
  useEffect(()=>{if(sel)loadClient(sel).catch(e=>toastErr(e.message));},[sel]);
  useEffect(()=>{if(!sel)return;const id=setInterval(async()=>{try{const[c,m,pl,mx,fm,cv,ct,dl,tk,cal,ap,ac]=await Promise.all([API.content(sel),API.messages(sel),API.plan(sel),API.metrics(sel),API.formulas(sel),API.conversations(sel),API.contacts(sel),API.deals(sel),API.tasks(sel),API.calendars(sel),API.appointments(sel),API.activity(sel)]);setContent(c);setMessages(m);setPlan(pl);setMetrics(mx);setFormulas(fm);setConversations(cv);setContacts(ct);setDeals(dl);setTasks(tk);setCalendars(cal);setAppointments(ap);setActivity(ac);setClients(await API.clients());}catch{}},6000);return()=>clearInterval(id);},[sel]);
  useEffect(()=>{if(!user)return;const id=setInterval(async()=>{try{setAgencyMetrics(await API.agencyMetrics());setOpsMetrics(await API.agencyOps());}catch{}},6000);return()=>clearInterval(id);},[user,agencyRole]);

  const createClient=async(f)=>{
    if(!can('clients.manage')){toastErr('Tu rol no puede crear clientes');return;}
    try{
      const created=await API.createClient({
        fullName:f.fullName,
        businessSector:f.businessSector,
        phone:f.phone,
        email:f.email,
        password:f.password,
        avatarUrl:f.avatarUrl,
        socialLinks:normalizeSocialLinksPayload(f),
        planName:f.planName,
        planPeriod:f.planPeriod,
        planTotal:f.planTotal,
        capFormat:{
          reel:Number(f.planReels||0),
          carrusel:Number(f.planCarruseles||0),
          flyer:Number(f.planFlyers||0),
        },
      });
      const list=await API.clients();
      setClients(list);
      setSel(created.id);
      setView('content');
      loadAgencyMetrics().catch(()=>{});
      setCreateClientOpen(false);
      toast('Cliente creado y agregado a la base de datos');
    }catch(e){toastErr(e.message);}
  };

  const editClient=async(f)=>{
    if(!can('clients.manage')){toastErr('Tu rol no puede editar clientes');return;}
    try{
      await API.updateClient(sel,{fullName:f.fullName,businessSector:f.businessSector,phone:f.phone,email:f.email,avatarUrl:f.avatarUrl,socialLinks:normalizeSocialLinksPayload(f)});
      const [list, updatedProfile, updatedSocials]=await Promise.all([API.clients(),API.profile(sel),API.socials(sel)]);
      setClients(list);
      setProfile(updatedProfile);
      setSocials(updatedSocials);
      setEditClientOpen(false);
      toast('Cliente actualizado');
    }catch(e){toastErr(e.message);}
  };

  const updatePlan=async(f)=>{
    if(!can('clients.manage')){toastErr('Tu rol no puede actualizar planes');return;}
    try{
      await API.updatePlan(sel,{name:f.name,period:f.period,total:f.total,capPlatform:f.capPlatform,capFormat:f.capFormat});
      const [list, updatedPlan]=await Promise.all([API.clients(),API.plan(sel)]);
      setClients(list);
      setPlan(updatedPlan);
      loadAgencyMetrics().catch(()=>{});
      setPlanClientOpen(false);
      toast('Plan actualizado');
    }catch(e){toastErr(e.message);}
  };

  const deleteClient=async()=>{
    if(!can('clients.manage')){toastErr('Tu rol no puede eliminar clientes');return;}
    if(!sel) return;
    if(!window.confirm('¿Eliminar este cliente y todos sus datos asociados?')) return;
    try{
      await API.deleteClient(sel);
      const list=await API.clients();
      setClients(list);
      const next=list[0]?.id||null;
      setSel(next);
      if(!next){
        setProfile(null);setSocials(null);setContent([]);setMessages([]);setPlan(null);setMetrics(null);
        setContacts([]);setDeals([]);setTasks([]);setCampaigns([]);setAutomations([]);setConversations([]);setActivity([]);
      }
      loadAgencyMetrics().catch(()=>{});
      toast('Cliente eliminado');
    }catch(e){toastErr(e.message);}
  };

  const importClients=async(rows)=>{
    if(!can('clients.manage')){throw new Error('Tu rol no puede importar clientes');}
    const result=await API.importClients({clients:rows});
    const list=await API.clients();
    setClients(list);
    if(list.length && !sel) setSel(list[0].id);
    loadAgencyMetrics().catch(()=>{});
    setImportClientsOpen(false);
    return result;
  };

  const exportAllClients=()=>{
    const rows=clients.map(c=>({
      id:c.id,
      fullName:c.fullName,
      businessSector:c.businessSector,
      planUsed:c.planUsed,
      planTotal:c.planTotal,
      pending:c.pending,
      connected:c.connected,
    }));
    downloadTextFile('clientes-agencia.csv', toCsv(rows, ['id','fullName','businessSector','planUsed','planTotal','pending','connected']), 'text/csv;charset=utf-8');
    setExportDataOpen(false);
    toast('Clientes exportados en CSV');
  };

  const exportCurrentClient=async()=>{
    if(!sel) return;
    const [profileData, socialData, contentData, messagesData, planData, metricsData, contactsData, dealsData, tasksData, campaignsData, automationsData, conversationsData]=await Promise.all([
      API.profile(sel), API.socials(sel), API.content(sel), API.messages(sel), API.plan(sel), API.metrics(sel), API.contacts(sel), API.deals(sel), API.tasks(sel), API.campaigns(sel), API.automations(sel), API.conversations(sel),
    ]);
    const payload={
      client: selClient,
      profile: profileData,
      socials: socialData,
      content: contentData,
      messages: messagesData,
      plan: planData,
      metrics: metricsData,
      contacts: contactsData,
      deals: dealsData,
      tasks: tasksData,
      campaigns: campaignsData,
      automations: automationsData,
      conversations: conversationsData,
    };
    downloadTextFile(`${(selClient?.fullName||'cliente').toLowerCase().replace(/\s+/g,'-')}-ficha.json`, JSON.stringify(payload,null,2), 'application/json;charset=utf-8');
    setExportDataOpen(false);
    toast('Ficha exportada en JSON');
  };

  const createContent=async(f)=>{if(!can('content.write')){toastErr('Tu rol no puede crear contenido');return;}await API.createContent(sel,f);setContent(await API.content(sel));setClients(await API.clients());};
  const updateContent=async(id,payload)=>{if(!can('content.write')){toastErr('Tu rol no puede editar contenido');return;}await API.updateContent(sel,id,payload);setContent(await API.content(sel));setClients(await API.clients());toast('Publicación actualizada');};
  const importContent=async(payload)=>{
    if(payload?.preview) return API.previewContentImport(sel,{items:payload.items});
    const result=await API.importContent(sel,payload);
    setContent(await API.content(sel));
    setClients(await API.clients());
    return result;
  };
  const setContentStatus=async(id,status)=>{if(!can('content.approve')){toastErr('Tu rol no puede aprobar contenido');return;}try{await API.setContentStatus(sel,id,{status});setContent(await API.content(sel));setMetrics(await API.metrics(sel));toast('Estado de pieza actualizado');}catch(e){toastErr(e.message);}};
  const sendMsg=async(t)=>{try{await API.send(sel,t);setMessages(await API.messages(sel));}catch(e){toastErr(e.message);}};
  const refreshMetrics=async()=>{try{setMetrics(await API.metrics(sel));}catch{}};
  const createContact=async(f)=>{await API.createContact(sel,f);setContacts(await API.contacts(sel));refreshMetrics();toast('Contacto creado');};
  const updateContact=async(id,f)=>{await API.updateContact(sel,id,f);setContacts(await API.contacts(sel));refreshMetrics();toast('Contacto actualizado');};
  const deleteContact=async(id)=>{await API.deleteContact(sel,id);setContacts(await API.contacts(sel));refreshMetrics();toast('Contacto eliminado');};
  const createDeal=async(f)=>{await API.createDeal(sel,f);const[d,mx]=await Promise.all([API.deals(sel),API.metrics(sel)]);setDeals(d);setMetrics(mx);toast('Oportunidad creada');};
  const moveDeal=async(id,stage)=>{await API.updateDeal(sel,id,{stage});const[d,mx]=await Promise.all([API.deals(sel),API.metrics(sel)]);setDeals(d);setMetrics(mx);};
  const createTask=async(f)=>{await API.createTask(sel,f);setTasks(await API.tasks(sel));toast('Tarea creada');};
  const toggleTask=async(t)=>{await API.updateTask(sel,t.id,{done:!t.done});setTasks(await API.tasks(sel));};
  const deleteTask=async(id)=>{await API.deleteTask(sel,id);setTasks(await API.tasks(sel));toast('Tarea eliminada');};
  const createCampaign=async(f)=>{if(!can('campaigns.manage')){toastErr('Tu rol no puede crear campañas');return;}await API.createCampaign(sel,f);setCampaigns(await API.campaigns(sel));toast('Campaña creada');};
  const createFormula=async(f)=>{if(!can('reports.manage')){toastErr('Tu rol no puede crear fórmulas');return;}await API.createFormula(sel,f);setFormulas(await API.formulas(sel));toast('Formula guardada');};
  const updateFormula=async(id,f)=>{if(!can('reports.manage')){toastErr('Tu rol no puede editar fórmulas');return;}await API.updateFormula(sel,id,f);setFormulas(await API.formulas(sel));toast('Formula actualizada');};
  const deleteFormula=async(f)=>{if(!can('reports.manage')){toastErr('Tu rol no puede eliminar fórmulas');return;}if(!window.confirm(`¿Eliminar la formula "${f.name}"?`)) return;await API.deleteFormula(sel,f.id);setFormulas(await API.formulas(sel));toast('Formula eliminada');};
  const createSnapshot=async(payload)=>{if(!can('templates.manage')){toastErr('Tu rol no puede crear snapshots');return;}if(!sel){toastErr('Selecciona un cliente origen');return;}await API.createSnapshot({sourceClientId:sel,name:payload.name});await loadTemplates();toast('Snapshot creado');};
  const applySnapshot=async(templateId,targetClientId)=>{if(!can('templates.manage')){toastErr('Tu rol no puede aplicar snapshots');return;}if(!targetClientId){toastErr('Elige cliente destino');return;}await API.applySnapshot(templateId,{targetClientId});if(targetClientId===sel){await loadClient(sel);await loadTemplateAssignments(sel);}toast('Snapshot aplicado');};
  const rollbackSnapshot=async(templateId)=>{if(!can('templates.manage')){toastErr('Tu rol no puede hacer rollback');return;}await API.rollbackTemplate({targetClientId:sel,templateId});await loadClient(sel);await loadTemplateAssignments(sel);await loadTemplates();toast('Rollback aplicado');};
  const createCalendar=async(f)=>{if(!can('calendar.manage')){toastErr('Tu rol no puede crear calendarios');return;}await API.createCalendar(sel,f);setCalendars(await API.calendars(sel));toast('Calendario creado');};
  const updateCalendar=async(id,f)=>{if(!can('calendar.manage')){toastErr('Tu rol no puede editar calendarios');return;}await API.updateCalendar(sel,id,f);setCalendars(await API.calendars(sel));toast('Calendario actualizado');};
  const createAppointment=async(f)=>{if(!can('calendar.manage')){toastErr('Tu rol no puede reservar citas');return;}try{await API.createAppointment(sel,f);const [ap,mx,tk,ct]=await Promise.all([API.appointments(sel),API.metrics(sel),API.tasks(sel),API.contacts(sel)]);setAppointments(ap);setMetrics(mx);setTasks(tk);setContacts(ct);toast('Cita reservada');}catch(e){toastErr(e.message);}};
  const updateAppointment=async(ap,patch)=>{if(!can('calendar.manage')){toastErr('Tu rol no puede actualizar citas');return;}try{await API.updateAppointment(sel,ap.id,patch);setAppointments(await API.appointments(sel));toast('Cita actualizada');}catch(e){toastErr(e.message);}};
  const createAutomation=async(f)=>{if(!can('automation.manage')){toastErr('Tu rol no puede crear automatizaciones');return;}await API.createAutomation(sel,f);const[a,mx]=await Promise.all([API.automations(sel),API.metrics(sel)]);setAutomations(a);setMetrics(mx);toast('Automatización activada');};
  const toggleAutomation=async(a)=>{if(!can('automation.manage')){toastErr('Tu rol no puede editar automatizaciones');return;}await API.updateAutomation(sel,a.id,{status:a.status==='activa'?'pausada':'activa'});setAutomations(await API.automations(sel));};
  const replyConv=async(id,text)=>{await API.replyConversation(sel,id,text);setConversations(await API.conversations(sel));};
  const readConv=async(id)=>{await API.updateConversation(sel,id,{read:true});setConversations(await API.conversations(sel));};
  const toggleConvStatus=async(c)=>{await API.updateConversation(sel,c.id,{status:c.status==='abierta'?'cerrada':'abierta'});setConversations(await API.conversations(sel));};
  const logout=()=>{setToken(null);setUser(null);};

  if(!ready) return <div className="auth-wrap"><div style={{color:'#fff',fontFamily:'var(--font-display)'}}>Cargando…</div></div>;
  if(!user) return <><AuthGate onAuth={setUser}/><ToastHost/></>;

  const selClient=clients.find(c=>c.id===sel);
  const unread=conversations.reduce((s,c)=>s+(c.unread>0?1:0),0);
  const todayStr=new Date().toISOString().slice(0,10);
  const tasksDue=tasks.filter(t=>!t.done&&t.due<=todayStr).length;
  const views=[{k:'overview',l:'Resumen'},...(can('ops.view')?[{k:'operations',l:'Operaciones'}]:[]),{k:'content',l:'Parrilla'},{k:'analytics',l:'Reportes'},{k:'contacts',l:'Contactos'},{k:'pipeline',l:'Embudo'},{k:'tasks',l:'Tareas',badge:tasksDue},{k:'campaigns',l:'Campañas'},{k:'calendar',l:'Citas'},{k:'automations',l:'Automatización'},{k:'templates',l:'Plantillas'},{k:'inbox',l:'Bandeja',badge:unread},{k:'messages',l:'Chat'},{k:'plan',l:'Plan'},{k:'activity',l:'Historial'}];
  return (<div className="app">
    <aside className="sidebar">
      <div className="brand"><div className="brand-mark violet">P</div><div><div className="brand-name">Pauta&nbsp;Studio</div><div className="brand-sub">Panel agencia</div></div></div>
      <div className="nav-label" style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}}>
        <span>Clientes</span>
        <div style={{display:'flex',gap:6}}>
          <button className="btn btn-ghost btn-sm" onClick={()=>setExportDataOpen(true)}><Ico d={icons.ext} size={14}/>Exportar</button>
          <button className="btn btn-ghost btn-sm" onClick={()=>setImportClientsOpen(true)} disabled={!can('clients.manage')}><Ico d={icons.grid} size={14}/>Importar</button>
          <button className="btn btn-ghost btn-sm" onClick={()=>setPlanClientOpen(true)} disabled={!sel||!can('clients.manage')}><Ico d={icons.plan} size={14}/>Plan</button>
          <button className="btn btn-ghost btn-sm" onClick={()=>setEditClientOpen(true)} disabled={!sel||!can('clients.manage')}><Ico d={icons.edit} size={14}/>Editar</button>
          <button className="btn btn-ghost btn-sm" onClick={deleteClient} disabled={!sel||!can('clients.manage')}><Ico d={icons.trash} size={14}/>Eliminar</button>
          <button className="btn btn-ghost btn-sm" onClick={()=>setCreateClientOpen(true)} disabled={!can('clients.manage')}><Ico d={icons.plus} size={14}/>Nuevo</button>
        </div>
      </div>
      <div className="nav" style={{gap:8}}>{clients.map(c=>(<button key={c.id} className={'client-row'+(sel===c.id?' active':'')} onClick={()=>setSel(c.id)} style={{padding:'10px 12px'}}>
        <div className="client-av" style={{width:34,height:34,fontSize:13}}>{c.avatarUrl?<img src={c.avatarUrl} alt={c.fullName||'cliente'}/>:(c.fullName||'?').split(' ').map(s=>s[0]).slice(0,2).join('')}</div>
        <div style={{flex:1,minWidth:0,textAlign:'left'}}><div style={{fontSize:13,fontWeight:600,color:'#fff',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{c.fullName}</div>
          <div style={{fontSize:11,color:'#8E8EA8'}}>{c.planUsed}/{c.planTotal} pubs</div></div>
        {c.pending>0&&<span className="nav-badge" style={{position:'static'}}>{c.pending}</span>}</button>))}</div>
      <div className="side-foot"><button className="logout-btn" onClick={logout}><Ico d={icons.out} size={15}/> Cerrar sesión</button></div>
    </aside>
    <div className="main">
      <header className="topbar"><div><h1>{view==='overview'?'Resumen de agencia':view==='operations'?'Centro de operaciones':(selClient?.fullName||'Selecciona un cliente')}</h1><div className="crumb">{view==='overview'?'Visión operativa global':view==='operations'?'SLA y productividad del equipo':(selClient?.businessSector||'Panel de gestión')}</div></div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <label style={{fontSize:12,color:'var(--muted)'}}>Rol</label>
          <select className="input" style={{minWidth:170}} value={agencyRole} onChange={e=>setAgencyRole(e.target.value)}>
            <option value="owner">owner</option>
            <option value="strategist">strategist</option>
            <option value="trafficker">trafficker</option>
            <option value="closer">closer</option>
          </select>
        </div></header>
      <div className="content">
        <>
          <div className="mobile-client-tools card card-pad">
            <div className="section-title" style={{marginBottom:10}}><Ico d={icons.contacts} size={16}/>Gestión de clientes</div>
            <div className="grid" style={{gridTemplateColumns:'1fr auto',gap:10,alignItems:'end'}}>
              <div className="field" style={{margin:0}}>
                <label>Cliente activo</label>
                <select className="input" value={sel||''} onChange={e=>setSel(e.target.value||null)}>
                  {clients.length?clients.map(c=><option key={c.id} value={c.id}>{c.fullName} · {c.planUsed}/{c.planTotal}</option>):<option value="">Sin clientes</option>}
                </select>
              </div>
              <button className="btn btn-primary btn-sm" onClick={()=>setCreateClientOpen(true)} disabled={!can('clients.manage')}><Ico d={icons.plus} size={14}/>Nuevo</button>
            </div>
            <div className="mobile-client-actions" style={{marginTop:10}}>
              <button className="btn btn-ghost btn-sm" onClick={()=>setEditClientOpen(true)} disabled={!sel||!can('clients.manage')}><Ico d={icons.edit} size={14}/>Editar</button>
              <button className="btn btn-ghost btn-sm" onClick={()=>setPlanClientOpen(true)} disabled={!sel||!can('clients.manage')}><Ico d={icons.plan} size={14}/>Plan</button>
              <button className="btn btn-ghost btn-sm" onClick={()=>setImportClientsOpen(true)} disabled={!can('clients.manage')}><Ico d={icons.grid} size={14}/>Importar</button>
              <button className="btn btn-ghost btn-sm" onClick={()=>setExportDataOpen(true)}><Ico d={icons.ext} size={14}/>Exportar</button>
              <button className="btn btn-ghost btn-sm" onClick={deleteClient} disabled={!sel||!can('clients.manage')}><Ico d={icons.trash} size={14}/>Eliminar</button>
            </div>
          </div>
          <div className="tabs" style={{marginBottom:18,flexWrap:'wrap'}}>{views.map(v=>(<button key={v.k} className={'tab'+(view===v.k?' active':'')} onClick={()=>setView(v.k)}>{v.l}{v.badge>0&&<span className="nav-badge" style={{position:'static',marginLeft:6}}>{v.badge}</span>}</button>))}</div>
          {view==='overview'&&<AgencyOverview metrics={agencyMetrics}/>}
          {view==='operations'&&<OperationsCenter ops={opsMetrics}/>} 
          {view!=='overview'&&view!=='operations'&&!sel&&<Empty title="Elige un cliente" sub="Selecciona un cliente para continuar." ic={icons.contacts}/>}
          {view!=='overview'&&view!=='operations'&&!!sel&&<>
          {view==='content'&&<ClientContent content={content} onCreate={createContent} onImport={importContent} onStatusChange={setContentStatus} onUpdate={updateContent} canWriteContent={can('content.write')} canApproveContent={can('content.approve')}/>} 
          {view==='analytics'&&<Analytics metrics={metrics} content={content} formulas={formulas} onCreateFormula={createFormula} onUpdateFormula={updateFormula} onDeleteFormula={deleteFormula} canManageReports={can('reports.manage')}/>} 
          {view==='contacts'&&<Contacts contacts={contacts} onCreate={createContact} onUpdate={updateContact} onDelete={deleteContact}/>}
          {view==='pipeline'&&<Pipeline deals={deals} contacts={contacts} onCreate={createDeal} onMove={moveDeal}/>}
          {view==='tasks'&&<Tasks tasks={tasks} contacts={contacts} onCreate={createTask} onToggle={toggleTask} onDelete={deleteTask}/>}
          {view==='campaigns'&&<Campaigns campaigns={campaigns} onCreate={createCampaign}/>}
          {view==='calendar'&&<CalendarHub calendars={calendars} appointments={appointments} onCreateCalendar={createCalendar} onUpdateCalendar={updateCalendar} onCreateAppointment={createAppointment} onUpdateAppointment={updateAppointment}/>}
          {view==='automations'&&<Automations automations={automations} onCreate={createAutomation} onToggle={toggleAutomation}/>}
          {view==='templates'&&<TemplatesHub templates={templates} clients={clients} sel={sel} assignments={templateAssignments} onCreateSnapshot={createSnapshot} onApplySnapshot={applySnapshot} onRefresh={loadTemplates} onRollback={rollbackSnapshot} canManageTemplates={can('templates.manage')}/>} 
          {view==='inbox'&&<Inbox conversations={conversations} onReply={replyConv} onRead={readConv} onToggleStatus={toggleConvStatus}/>}
          {view==='messages'&&<ClientMessages messages={messages} onSend={sendMsg}/>}
          {view==='plan'&&<ClientPlan plan={plan} profile={profile} socials={socials}/>}
          {view==='activity'&&<ActivityFeed logs={activity}/>} 
          </>}
        </>
      </div></div>
      <NewClientModal open={createClientOpen} onClose={()=>setCreateClientOpen(false)} onCreate={createClient}/>
      <EditClientModal
        open={editClientOpen}
        onClose={()=>setEditClientOpen(false)}
        onSubmit={editClient}
        title="Editar cliente"
        submitLabel="Guardar cambios"
        initial={{
          fullName: profile?.fullName||selClient?.fullName||'',
          businessSector: profile?.businessSector||selClient?.businessSector||'',
          phone: profile?.phone||selClient?.phone||'',
          email: profile?.email||selClient?.email||'',
          avatarUrl: profile?.avatarUrl||selClient?.avatarUrl||'',
          instagram: profile?.socialLinks?.instagram||selClient?.socialLinks?.instagram||'',
          facebook: profile?.socialLinks?.facebook||selClient?.socialLinks?.facebook||'',
          tiktok: profile?.socialLinks?.tiktok||selClient?.socialLinks?.tiktok||'',
          youtube: profile?.socialLinks?.youtube||selClient?.socialLinks?.youtube||'',
          linkedin: profile?.socialLinks?.linkedin||selClient?.socialLinks?.linkedin||'',
          x: profile?.socialLinks?.x||selClient?.socialLinks?.x||'',
        }}
      />
      <PlanModal open={planClientOpen} onClose={()=>setPlanClientOpen(false)} onSubmit={updatePlan} initial={plan}/>
      <ImportClientsModal open={importClientsOpen} onClose={()=>setImportClientsOpen(false)} onImport={importClients}/>
      <ExportDataModal open={exportDataOpen} onClose={()=>setExportDataOpen(false)} onExportAll={exportAllClients} onExportCurrent={exportCurrentClient} hasClient={!!sel}/>
      <ToastHost/></div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
