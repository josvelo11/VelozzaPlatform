<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ===== API DE LA AGENCIA (envía clientId para gestionar a cada cliente) ===== */
const TOKEN_KEY='crm_agency_token';
const getToken=()=>localStorage.getItem(TOKEN_KEY);
const setToken=(t)=>t?localStorage.setItem(TOKEN_KEY,t):localStorage.removeItem(TOKEN_KEY);
async function apiFetch(path,{method='GET',body,clientId}={}){
  let url='/api/clientes'+path;
  if(clientId) url+=(url.includes('?')?'&':'?')+'clientId='+encodeURIComponent(clientId);
  const res=await fetch(url,{method,headers:{'Content-Type':'application/json',...(getToken()?{Authorization:'Bearer '+getToken()}:{})},body:body?JSON.stringify(body):undefined});
  const data=await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(data.error||'Error de conexión');
  return data;
}
const API={
  login:(email,password)=>apiFetch('/auth/login',{method:'POST',body:{email,password}}),
  me:()=>apiFetch('/auth/me'),
  clients:()=>apiFetch('/clients'),
  profile:(cid)=>apiFetch('/profile',{clientId:cid}),
  socials:(cid)=>apiFetch('/socials',{clientId:cid}),
  content:(cid)=>apiFetch('/content',{clientId:cid}),
  createContent:(cid,b)=>apiFetch('/content',{method:'POST',body:b,clientId:cid}),
  messages:(cid)=>apiFetch('/messages',{clientId:cid}),
  send:(cid,text)=>apiFetch('/messages',{method:'POST',body:{text},clientId:cid}),
  plan:(cid)=>apiFetch('/plan',{clientId:cid}),
  metrics:(cid)=>apiFetch('/metrics',{clientId:cid}),
  contacts:(cid)=>apiFetch('/contacts',{clientId:cid}),
  createContact:(cid,b)=>apiFetch('/contacts',{method:'POST',body:b,clientId:cid}),
  updateContact:(cid,id,b)=>apiFetch('/contacts/'+id,{method:'PUT',body:b,clientId:cid}),
  deleteContact:(cid,id)=>apiFetch('/contacts/'+id,{method:'DELETE',clientId:cid}),
  deals:(cid)=>apiFetch('/deals',{clientId:cid}),
  createDeal:(cid,b)=>apiFetch('/deals',{method:'POST',body:b,clientId:cid}),
  updateDeal:(cid,id,b)=>apiFetch('/deals/'+id,{method:'PUT',body:b,clientId:cid}),
  deleteDeal:(cid,id)=>apiFetch('/deals/'+id,{method:'DELETE',clientId:cid}),
  tasks:(cid)=>apiFetch('/tasks',{clientId:cid}),
  createTask:(cid,b)=>apiFetch('/tasks',{method:'POST',body:b,clientId:cid}),
  updateTask:(cid,id,b)=>apiFetch('/tasks/'+id,{method:'PUT',body:b,clientId:cid}),
  deleteTask:(cid,id)=>apiFetch('/tasks/'+id,{method:'DELETE',clientId:cid}),
  campaigns:(cid)=>apiFetch('/campaigns',{clientId:cid}),
  createCampaign:(cid,b)=>apiFetch('/campaigns',{method:'POST',body:b,clientId:cid}),
  automations:(cid)=>apiFetch('/automations',{clientId:cid}),
  createAutomation:(cid,b)=>apiFetch('/automations',{method:'POST',body:b,clientId:cid}),
  updateAutomation:(cid,id,b)=>apiFetch('/automations/'+id,{method:'PUT',body:b,clientId:cid}),
  conversations:(cid)=>apiFetch('/conversations',{clientId:cid}),
  replyConversation:(cid,id,text)=>apiFetch('/conversations/'+id+'/reply',{method:'POST',body:{text},clientId:cid}),
  updateConversation:(cid,id,b)=>apiFetch('/conversations/'+id,{method:'PUT',body:b,clientId:cid}),
};
/* ===== CONSTANTES / HELPERS (compartido con el portal) ===== */

const PLATFORMS={
  facebook:{name:'Facebook',mono:'f',color:'var(--c-facebook)',hex:'#1877F2',base:'https://facebook.com/'},
  instagram:{name:'Instagram',mono:'◎',color:'var(--c-instagram)',hex:'#E1306C',base:'https://instagram.com/'},
  tiktok:{name:'TikTok',mono:'♪',color:'var(--c-tiktok)',hex:'#111111',base:'https://tiktok.com/@'},
  youtube:{name:'YouTube',mono:'▶',color:'var(--c-youtube)',hex:'#FF0000',base:'https://youtube.com/@'},
  linkedin:{name:'LinkedIn',mono:'in',color:'var(--c-linkedin)',hex:'#0A66C2',base:'https://linkedin.com/company/'},
  x:{name:'X',mono:'𝕏',color:'var(--c-x)',hex:'#111111',base:'https://x.com/'},
};
const PKEYS=Object.keys(PLATFORMS);
const STAGES=[{k:'nuevo',l:'Nuevo',c:'#9A9AAB'},{k:'contactado',l:'Contactado',c:'#6C5CE7'},{k:'propuesta',l:'Propuesta',c:'#1877F2'},{k:'negociacion',l:'Negociación',c:'#F4A52C'},{k:'ganado',l:'Ganado',c:'#19B98C'}];
const TAG_COLORS={VIP:['#FBE9D7','#B5651d'],Recurrente:['rgba(25,185,140,.14)','#10805f'],Nuevo:['rgba(108,92,231,.14)','#5a4bd1'],Empresa:['rgba(24,119,242,.12)','#1259b3'],Inactivo:['#F1F0EB','#6B6B7B']};
const SOURCE_LABEL={instagram:'Instagram',facebook:'Facebook',tiktok:'TikTok',youtube:'YouTube',linkedin:'LinkedIn',x:'X',web:'Web',referido:'Referido'};
const fmtCOP=n=>new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',maximumFractionDigits:0}).format(n||0);
const fmtK=n=>{n=Number(n)||0;return n>=1000?(n/1000).toFixed(n>=10000?0:1).replace('.0','')+'k':String(n);};
const avatarColor=s=>{const c=['#6C5CE7','#FF6B4A','#1877F2','#19B98C','#E1306C','#F4A52C'];let h=0;for(const ch of (s||'x'))h=ch.charCodeAt(0)+h;return c[h%c.length];};
const initialsOf=s=>(s||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();


/* ===== ICONOS / TOAST (compartido con el portal) ===== */

const Ico=({d,size=18,stroke=1.7})=>(<svg className="nav-ico" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round">{d}</svg>);
const icons={
  home:<><path d="M3 10.5L12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></>,
  user:<><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></>,
  share:<><circle cx="6" cy="12" r="3"/><circle cx="18" cy="6" r="3"/><circle cx="18" cy="18" r="3"/><path d="M8.6 10.6l6.8-3.2M8.6 13.4l6.8 3.2"/></>,
  grid:<><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></>,
  check:<><path d="M4 12.5l5 5L20 6"/></>,
  chat:<><path d="M4 5h16v11H8l-4 4V5z"/></>,
  plan:<><path d="M4 19V5M4 19h16"/><rect x="7" y="11" width="3" height="6"/><rect x="12" y="7" width="3" height="10"/><rect x="17" y="13" width="3" height="4"/></>,
  bell:<><path d="M6 9a6 6 0 0112 0c0 5 2 6 2 6H4s2-1 2-6z"/><path d="M10 20a2 2 0 004 0"/></>,
  link:<><path d="M9 15l6-6"/><path d="M11 6l1-1a4 4 0 016 6l-1 1"/><path d="M13 18l-1 1a4 4 0 01-6-6l1-1"/></>,
  cal:<><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></>,
  send:<><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></>,
  plus:<><path d="M12 5v14M5 12h14"/></>,
  ext:<><path d="M14 4h6v6"/><path d="M20 4l-9 9"/><path d="M18 13v6H5V6h6"/></>,
  out:<><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><path d="M16 17l5-5-5-5M21 12H9"/></>,
  contacts:<><circle cx="9" cy="8" r="3.2"/><path d="M3 20c0-3.3 2.7-5 6-5s6 1.7 6 5"/><path d="M16 5.5a3 3 0 010 5.6M21 20c0-2.6-1.6-4.2-4-4.8"/></>,
  funnel:<><path d="M3 5h18l-7 8v6l-4-2v-4z"/></>,
  task:<><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M8 10l2.5 2.5L16 7"/></>,
  chart:<><path d="M4 20V4M4 20h16"/><path d="M7 16l4-5 3 3 4-6"/></>,
  mega:<><path d="M3 11v2a1 1 0 001 1h2l9 5V5L6 10H4a1 1 0 00-1 1z"/><path d="M18 9a3 3 0 010 6"/></>,
  search:<><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></>,
  trash:<><path d="M4 7h16M9 7V5h6v2M6 7l1 13h10l1-13"/></>,
  edit:<><path d="M4 20h4L19 9l-4-4L4 16v4z"/><path d="M14 6l4 4"/></>,
  close:<><path d="M6 6l12 12M18 6L6 18"/></>,
  money:<><circle cx="12" cy="12" r="9"/><path d="M12 7v10M9.5 9.5a2.5 2 0 012.5-1.5c1.4 0 2.5.7 2.5 1.8 0 2.4-5 1.4-5 3.6 0 1.1 1.1 1.8 2.5 1.8a2.5 2 0 002.5-1.5"/></>,
  zap:<><path d="M13 2L4 14h7l-1 8 9-12h-7z"/></>,
  inbox:<><path d="M3 13h5l2 3h4l2-3h5"/><path d="M5 4h14l2 9v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5z"/></>,
};
let toastFn=()=>{};
function ToastHost(){const[t,setT]=useState(null);useEffect(()=>{toastFn=(m,e)=>{setT({m,e});setTimeout(()=>setT(null),2600);};},[]);
  return <div className={'toast'+(t?' show':'')+(t?.e?' error':'')}><span>{t?.e?'!':'✓'}</span>{t?.m}</div>;}
const toast=(m)=>toastFn(m,false);const toastErr=(m)=>toastFn(m,true);
function StatusPill({s}){const map={approved:['pill-mint','Aprobada'],pending:['pill-amber','Pendiente'],rejected:['pill-rose','Rechazada'],draft:['pill-muted','Borrador'],published:['pill-violet','Publicada'],enviada:['pill-mint','Enviada'],programada:['pill-amber','Programada'],borrador:['pill-muted','Borrador']};const[c,l]=map[s]||map.draft;return <span className={'pill '+c}>{l}</span>;}
function Empty({title,sub,ic}){return <div className="empty"><div className="e-ico"><Ico d={ic||icons.grid} size={22}/></div><div style={{fontWeight:600,fontSize:15,color:'var(--ink)'}}>{title}</div><div style={{fontSize:13,marginTop:4}}>{sub}</div></div>;}


/* ===== GRÁFICAS (SVG propias) (compartido con el portal) ===== */

function Donut({segments,size=150,thickness=20,center}){
  const total=segments.reduce((s,x)=>s+x.value,0)||1;const r=(size-thickness)/2,c=2*Math.PI*r;let off=0;
  return <div style={{position:'relative',width:size,height:size,flex:'0 0 auto'}}>
    <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#F1F0EB" strokeWidth={thickness}/>
    {segments.map((s,i)=>{const len=c*(s.value/total);const el=<circle key={i} cx={size/2} cy={size/2} r={r} fill="none" stroke={s.color} strokeWidth={thickness} strokeLinecap="butt" strokeDasharray={`${len} ${c-len}`} strokeDashoffset={-off} style={{transition:'all .6s'}}/>;off+=len;return el;})}</svg>
    {center&&<div style={{position:'absolute',inset:0,display:'grid',placeItems:'center',textAlign:'center'}}>{center}</div>}</div>;
}
function HBars({data}){const max=Math.max(...data.map(d=>d.value),1);
  return <div>{data.map((d,i)=>(<div className="bar-track" key={i}>
    <div className="bar-label">{d.badge}{d.label}</div>
    <div className="bar-rail"><div className="bar-val-fill" style={{'--brand':d.color,width:(d.value/max*100)+'%'}}/></div>
    <div className="bar-num">{d.display??d.value}</div></div>))}</div>;
}
function LineChart({points,height=190,color='#FF6B4A'}){
  if(!points||points.length<2) return null;
  const w=560,h=height,pad=30;const vals=points.map(p=>p.value);const max=Math.max(...vals),min=Math.min(...vals);const range=(max-min)||1;
  const X=i=>pad+(i/(points.length-1))*(w-pad*2);const Y=v=>h-pad-((v-min)/range)*(h-pad*2-6);
  const pts=points.map((p,i)=>`${X(i)},${Y(p.value)}`).join(' ');
  return <svg viewBox={`0 0 ${w} ${h}`} width="100%" preserveAspectRatio="none" style={{maxHeight:height}}>
    <defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.22"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
    <polygon points={`${pad},${h-pad} ${pts} ${w-pad},${h-pad}`} fill="url(#lg)"/>
    <polyline points={pts} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
    {points.map((p,i)=><circle key={i} cx={X(i)} cy={Y(p.value)} r="3.5" fill="#fff" stroke={color} strokeWidth="2"/>)}
    {points.map((p,i)=><text key={'t'+i} x={X(i)} y={h-9} fontSize="11" fill="#9A9AAB" textAnchor="middle" fontFamily="JetBrains Mono">{p.label}</text>)}
  </svg>;
}


/* ===== MODAL (compartido con el portal) ===== */

function Modal({title,onClose,children,footer}){
  return <div className="modal-back" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()}>
    <div className="modal-head"><h3>{title}</h3><button className="x-btn" onClick={onClose}><Ico d={icons.close} size={16}/></button></div>
    <div className="modal-body">{children}</div>{footer&&<div className="modal-foot">{footer}</div>}</div></div>;
}


/* ===== KPI helper (compartido con el portal) ===== */

function KPI({lbl,val,ico,c,bg,trend}){return (<div className="kpi"><div className="k-top"><div className="k-ico" style={{background:bg,color:c}}><Ico d={ico} size={18}/></div>{trend&&<span className="k-trend" style={{color:'var(--muted-2)'}}>{trend}</span>}</div><div className="k-val">{val}</div><div className="k-lbl">{lbl}</div></div>);}


/* ===== ANALÍTICA / REPORTES (compartido con el portal) ===== */

function Analytics({metrics,content}){
  if(!metrics) return null;
  const reach=PKEYS.map(k=>({label:PLATFORMS[k].name,value:metrics.reachByPlatform?.[k]||0,color:PLATFORMS[k].color,display:fmtK(metrics.reachByPlatform?.[k]||0),badge:<span className="mini-badge" style={{'--brand':PLATFORMS[k].color,width:18,height:18,fontSize:9,border:'none'}}>{PLATFORMS[k].mono}</span>})).filter(r=>r.value>0);
  const cs=metrics.contentByStatus||{};
  const donut=[{label:'Aprobadas',value:cs.approved||0,color:'#19B98C'},{label:'Pendientes',value:cs.pending||0,color:'#F4A52C'},{label:'Borrador',value:cs.draft||0,color:'#9A9AAB'},{label:'Publicadas',value:cs.published||0,color:'#6C5CE7'}].filter(d=>d.value>0);
  const totalContent=donut.reduce((s,d)=>s+d.value,0);
  const lastFollowers=metrics.followerGrowth?.at(-1)?.value||0;const firstFollowers=metrics.followerGrowth?.[0]?.value||0;
  const growthPct=firstFollowers?Math.round((lastFollowers-firstFollowers)/firstFollowers*100):0;
  return (<div className="grid" style={{gap:18}}>
    <div className="kpi-row">
      <KPI lbl="Seguidores totales" val={fmtK(lastFollowers)} ico={icons.share} c="var(--violet)" bg="rgba(108,92,231,.12)" trend={`+${growthPct}% 6 meses`}/>
      <KPI lbl="Engagement promedio" val={metrics.engagementRate+'%'} ico={icons.chart} c="var(--primary)" bg="rgba(255,107,74,.12)" trend="interacción"/>
      <KPI lbl="Apertura de email" val={metrics.openRate+'%'} ico={icons.mega} c="var(--mint)" bg="rgba(25,185,140,.12)" trend="campañas"/>
      <KPI lbl="Nuevos contactos" val={metrics.newContactsThisMonth} ico={icons.contacts} c="var(--amber)" bg="rgba(244,165,44,.15)" trend="este mes"/>
    </div>
    <div className="card card-pad"><div className="section-title" style={{marginBottom:6}}><Ico d={icons.chart} size={16}/>Crecimiento de seguidores</div>
      <p className="section-sub" style={{marginBottom:12}}>Suma de tus redes conectadas, últimos 6 meses.</p>
      <LineChart points={metrics.followerGrowth} color="#FF6B4A"/></div>
    <div className="chart-grid">
      <div className="card card-pad"><div className="section-title" style={{marginBottom:16}}><Ico d={icons.share} size={16}/>Alcance por red (mensual)</div>
        {reach.length?<HBars data={reach}/>:<p style={{fontSize:13,color:'var(--muted)'}}>Conecta redes para ver alcance.</p>}</div>
      <div className="card card-pad"><div className="section-title" style={{marginBottom:16}}><Ico d={icons.grid} size={16}/>Estado del contenido</div>
        <div style={{display:'flex',justifyContent:'center'}}><Donut segments={donut.length?donut:[{label:'—',value:1,color:'#F1F0EB'}]} center={<div><div style={{fontFamily:'var(--font-display)',fontSize:26,fontWeight:600}}>{totalContent}</div><div style={{fontSize:11,color:'var(--muted)'}}>piezas</div></div>}/></div>
        <div className="legend">{donut.map((d,i)=><div className="lg" key={i}><i style={{background:d.color}}/>{d.label} ({d.value})</div>)}</div></div>
    </div></div>);
}


/* ===== CONTACTOS (compartido con el portal) ===== */

function ContactModal({initial,onSave,onClose}){
  const[f,setF]=useState(initial||{name:'',email:'',phone:'',tag:'Nuevo',status:'lead',source:'web',notes:''});
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  return <Modal title={initial?'Editar contacto':'Nuevo contacto'} onClose={onClose}
    footer={<><button className="btn btn-ghost" onClick={onClose}>Cancelar</button><button className="btn btn-primary" onClick={()=>{if(!f.name){toastErr('Pon un nombre');return;}onSave(f);}}>Guardar</button></>}>
    <div className="field"><label>Nombre</label><input className="input" value={f.name} onChange={e=>set('name',e.target.value)}/></div>
    <div className="grid" style={{gridTemplateColumns:'1fr 1fr'}}>
      <div className="field"><label>Correo</label><input className="input" value={f.email} onChange={e=>set('email',e.target.value)}/></div>
      <div className="field"><label>Teléfono</label><input className="input" value={f.phone} onChange={e=>set('phone',e.target.value)}/></div></div>
    <div className="grid" style={{gridTemplateColumns:'1fr 1fr 1fr'}}>
      <div className="field"><label>Etiqueta</label><select className="input" value={f.tag} onChange={e=>set('tag',e.target.value)}>{Object.keys(TAG_COLORS).map(t=><option key={t}>{t}</option>)}</select></div>
      <div className="field"><label>Estado</label><select className="input" value={f.status} onChange={e=>set('status',e.target.value)}><option value="lead">Lead</option><option value="oportunidad">Oportunidad</option><option value="cliente">Cliente</option><option value="inactivo">Inactivo</option></select></div>
      <div className="field"><label>Origen</label><select className="input" value={f.source} onChange={e=>set('source',e.target.value)}>{Object.keys(SOURCE_LABEL).map(s=><option key={s} value={s}>{SOURCE_LABEL[s]}</option>)}</select></div></div>
    <div className="field"><label>Notas</label><textarea className="input" value={f.notes} onChange={e=>set('notes',e.target.value)} style={{minHeight:60}}/></div>
  </Modal>;
}
function Contacts({contacts,onCreate,onUpdate,onDelete}){
  const[q,setQ]=useState('');const[tagF,setTagF]=useState('all');const[modal,setModal]=useState(null);
  const statusPill={lead:['pill-amber','Lead'],oportunidad:['pill-violet','Oportunidad'],cliente:['pill-mint','Cliente'],inactivo:['pill-muted','Inactivo']};
  const filtered=contacts.filter(c=>(tagF==='all'||c.tag===tagF)&&(c.name.toLowerCase().includes(q.toLowerCase())||(c.email||'').toLowerCase().includes(q.toLowerCase())));
  return (<div>
    <div className="toolbar">
      <div className="search"><Ico d={icons.search} size={16}/><input placeholder="Buscar por nombre o correo…" value={q} onChange={e=>setQ(e.target.value)}/></div>
      <button className={'chip'+(tagF==='all'?' on':'')} onClick={()=>setTagF('all')}>Todos</button>
      {Object.keys(TAG_COLORS).map(t=><button key={t} className={'chip'+(tagF===t?' on':'')} onClick={()=>setTagF(t)}>{t}</button>)}
      <button className="btn btn-primary btn-sm" style={{marginLeft:'auto'}} onClick={()=>setModal({})}><Ico d={icons.plus} size={15}/>Nuevo contacto</button>
    </div>
    {filtered.length?<div className="table-wrap"><table className="tbl"><thead><tr><th>Contacto</th><th>Teléfono</th><th>Etiqueta</th><th>Estado</th><th>Origen</th><th>Alta</th><th></th></tr></thead>
      <tbody>{filtered.map(c=>{const[sc,sl]=statusPill[c.status]||statusPill.lead;const[bg,fg]=TAG_COLORS[c.tag]||TAG_COLORS.Nuevo;
        return (<tr key={c.id}><td><div className="contact-cell"><div className="contact-av" style={{background:avatarColor(c.name)}}>{initialsOf(c.name)}</div><div><div style={{fontWeight:600}}>{c.name}</div><div style={{fontSize:11.5,color:'var(--muted)'}}>{c.email||'—'}</div></div></div></td>
          <td style={{fontFamily:'var(--font-mono)',fontSize:12.5,color:'var(--muted)'}}>{c.phone||'—'}</td>
          <td><span className="tag" style={{background:bg,color:fg}}>{c.tag}</span></td>

const INBOX_CH={instagram:[PLATFORMS.instagram.hex,'◎'],facebook:[PLATFORMS.facebook.hex,'f'],whatsapp:['#25D366','✆'],email:['#6C5CE7','✉'],x:['#111','𝕏'],tiktok:['#111','♪']};
function Inbox({conversations,onReply,onRead,onToggleStatus}){
  const[sel,setSel]=useState(null);const[text,setText]=useState('');const bodyRef=useRef(null);
  const ordered=[...conversations].sort((a,b)=>(b.unread>0)-(a.unread>0));
  const current=conversations.find(c=>c.id===sel)||ordered[0]||null;
  useEffect(()=>{if(current&&current.id!==sel)setSel(current.id);},[conversations.length]);
  useEffect(()=>{if(bodyRef.current)bodyRef.current.scrollTop=bodyRef.current.scrollHeight;},[current?.messages?.length,sel]);
  const open=(c)=>{setSel(c.id);if(c.unread>0)onRead(c.id);};
  const send=()=>{const t=text.trim();if(!t||!current)return;onReply(current.id,t);setText('');};
  return (<div className="inbox">
    <div className="inbox-list">{ordered.map(c=>{const[col,gl]=INBOX_CH[c.channel]||INBOX_CH.email;const last=c.messages[c.messages.length-1];
      return (<div key={c.id} className={'conv'+(current&&c.id===current.id?' active':'')} onClick={()=>open(c)}>
        <div className="conv-av" style={{background:avatarColor(c.contactName)}}>{initialsOf(c.contactName)}<span className="conv-ch" style={{background:col}}>{gl}</span></div>
        <div className="conv-main"><div className="conv-top"><span className="conv-name">{c.contactName}</span><span className="conv-time">{c.updatedAt}</span></div>
          <div style={{display:'flex',alignItems:'center',gap:6}}><span className="conv-prev">{last?(last.from==='me'?'Tú: ':'')+last.text:''}</span>{c.unread>0&&<span className="conv-unread">{c.unread}</span>}</div></div></div>);})}
      {!conversations.length&&<div className="inbox-empty">Sin conversaciones aún.</div>}</div>
    {current?<div className="thread">
      <div className="thread-head"><div className="conv-av" style={{background:avatarColor(current.contactName),width:38,height:38}}>{initialsOf(current.contactName)}</div>
        <div style={{flex:1}}><div style={{fontWeight:600,fontSize:14}}>{current.contactName}</div><div style={{fontSize:11.5,color:'var(--muted)',textTransform:'capitalize'}}>{current.channel} · {current.status}</div></div>
        <button className="btn btn-ghost btn-sm" onClick={()=>onToggleStatus(current)}>{current.status==='abierta'?'Cerrar':'Reabrir'}</button></div>
      <div className="thread-body" ref={bodyRef}>{current.messages.map((m,i)=>(<div key={i} className={'tmsg '+(m.from==='me'?'me':'them')}>{m.text}<div className="tm-at">{m.at}</div></div>))}</div>
      <div className="thread-input"><input className="input" placeholder="Escribe una respuesta…" value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()}/><button className="btn btn-primary" onClick={send}><Ico d={icons.send} size={16}/></button></div>
    </div>:<div className="inbox-empty">Selecciona una conversación</div>}
  </div>);
}

        <div className="post-platforms">{c.platforms.map(p=><span key={p} className="mini-badge" style={{'--brand':PLATFORMS[p].color}}>{PLATFORMS[p].mono}</span>)}</div>
        <div className="post-date">{c.date.slice(5)}</div></div>
      <div className="post-body"><div className="post-title">{c.title}</div><div className="post-caption">{c.caption}</div>
        <div className="post-foot"><StatusPill s={c.status}/><span style={{fontSize:11.5,color:'var(--muted-2)',fontFamily:'var(--font-mono)'}}>{c.date}</span></div></div></div>))}</div>
      :<Empty title="Sin contenido aún" sub="Crea la primera publicación para este cliente." ic={icons.grid}/>}</div>);
}
function ClientMessages({messages,onSend}){
  const[text,setText]=useState('');const bodyRef=useRef(null);
  useEffect(()=>{if(bodyRef.current)bodyRef.current.scrollTop=bodyRef.current.scrollHeight;},[messages]);
  const send=()=>{const t=text.trim();if(!t)return;onSend(t);setText('');};
  return (<div className="chat" style={{maxWidth:760}}>
    <div className="chat-head"><div className="avatar">CL</div><div><div style={{fontWeight:600,fontSize:14}}>Chat con el cliente</div>
      <div style={{fontSize:12,color:'var(--mint)',display:'flex',alignItems:'center',gap:6}}><span className="dot-status" style={{background:'var(--mint)'}}/>Conversación en vivo</div></div></div>
    <div className="chat-body" ref={bodyRef}>{messages.map(m=>(<div key={m.id} className={'msg '+(m.from==='agency'?'me':'them')}>{m.text}<div className="meta">{m.at}</div></div>))}</div>
    <div className="chat-input"><input className="input" placeholder="Escribe al cliente…" value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()}/>
      <button className="btn btn-dark" onClick={send}><Ico d={icons.send} size={16}/></button></div></div>);
}
function ClientPlan({plan,profile,socials}){
  if(!plan) return null;const pct=plan.used/plan.total;
  return (<div className="grid" style={{gap:18,maxWidth:860}}>
    <div className="card card-pad"><div className="section-title">Resumen del cliente</div>
      <div className="grid" style={{gridTemplateColumns:'1fr 1fr',marginTop:14}}>
        <div><div className="eyebrow">Negocio</div><div style={{fontWeight:600,marginTop:4}}>{profile?.fullName}</div><div style={{fontSize:13,color:'var(--muted)'}}>{profile?.businessSector}</div><div style={{fontSize:13,color:'var(--muted)',fontFamily:'var(--font-mono)',marginTop:4}}>{profile?.phone}</div></div>
        <div><div className="eyebrow">Redes conectadas</div><div style={{display:'flex',gap:6,marginTop:8,flexWrap:'wrap'}}>{PKEYS.filter(k=>socials?.[k]?.connected).map(k=><span key={k} className="mini-badge" style={{'--brand':PLATFORMS[k].color}}>{PLATFORMS[k].mono}</span>)}</div></div></div></div>
    <div className="card card-pad"><div className="section-title">{plan.name} · {Math.round(pct*100)}% usado</div>
      <div className="plan-breakdown" style={{marginTop:14}}>{PKEYS.map(k=>{const used=plan.perPlatform?.[k]||0,cap=plan.capPlatform?.[k]||0,w=cap?Math.round(used/cap*100):0;
        return (<div className="pb-row" key={k}><div className="pb-name"><span className="social-badge" style={{'--brand':PLATFORMS[k].color,width:22,height:22,fontSize:11,borderRadius:6}}>{PLATFORMS[k].mono}</span>{PLATFORMS[k].name}</div>
          <div className="pb-bar"><div className="pb-fill" style={{'--brand':PLATFORMS[k].color,width:w+'%'}}/></div><div className="pb-num">{used}/{cap}</div></div>);})}</div>
      <div style={{marginTop:14,fontSize:13,color:'var(--muted)'}}>Total del plan: <b style={{color:'var(--ink)'}}>{plan.used}</b> de <b style={{color:'var(--ink)'}}>{plan.total}</b> publicaciones usadas.</div></div></div>);
}

/* ===== APP DE LA AGENCIA ===== */
function App(){
  const[user,setUser]=useState(null);const[ready,setReady]=useState(false);
  const[clients,setClients]=useState([]);const[sel,setSel]=useState(null);const[view,setView]=useState('content');
  const[profile,setProfile]=useState(null);const[socials,setSocials]=useState(null);
  const[content,setContent]=useState([]);const[messages,setMessages]=useState([]);const[plan,setPlan]=useState(null);const[metrics,setMetrics]=useState(null);
  const[contacts,setContacts]=useState([]);const[deals,setDeals]=useState([]);const[tasks,setTasks]=useState([]);const[campaigns,setCampaigns]=useState([]);
  const[automations,setAutomations]=useState([]);const[conversations,setConversations]=useState([]);

  useEffect(()=>{(async()=>{if(getToken()){try{const u=await API.me();if(u.role==='agency')setUser(u);else setToken(null);}catch{setToken(null);}}setReady(true);})();},[]);
  const loadClients=async()=>{const list=await API.clients();setClients(list);if(list.length&&!sel)setSel(list[0].id);};
  useEffect(()=>{if(user)loadClients().catch(e=>toastErr(e.message));},[user]);

  const loadClient=async(cid)=>{const[p,s,c,m,pl,mx,ct,dl,tk,cp,au,cv]=await Promise.all([API.profile(cid),API.socials(cid),API.content(cid),API.messages(cid),API.plan(cid),API.metrics(cid),API.contacts(cid),API.deals(cid),API.tasks(cid),API.campaigns(cid),API.automations(cid),API.conversations(cid)]);
    setProfile(p);setSocials(s);setContent(c);setMessages(m);setPlan(pl);setMetrics(mx);setContacts(ct);setDeals(dl);setTasks(tk);setCampaigns(cp);setAutomations(au);setConversations(cv);};
  useEffect(()=>{if(sel)loadClient(sel).catch(e=>toastErr(e.message));},[sel]);
  useEffect(()=>{if(!sel)return;const id=setInterval(async()=>{try{const[c,m,pl,mx,cv,ct,dl,tk]=await Promise.all([API.content(sel),API.messages(sel),API.plan(sel),API.metrics(sel),API.conversations(sel),API.contacts(sel),API.deals(sel),API.tasks(sel)]);setContent(c);setMessages(m);setPlan(pl);setMetrics(mx);setConversations(cv);setContacts(ct);setDeals(dl);setTasks(tk);setClients(await API.clients());}catch{}},6000);return()=>clearInterval(id);},[sel]);

  const createContent=async(f)=>{await API.createContent(sel,f);setContent(await API.content(sel));setClients(await API.clients());};
  const sendMsg=async(t)=>{try{await API.send(sel,t);setMessages(await API.messages(sel));}catch(e){toastErr(e.message);}};
  const refreshMetrics=async()=>{try{setMetrics(await API.metrics(sel));}catch{}};
  const createContact=async(f)=>{await API.createContact(sel,f);setContacts(await API.contacts(sel));refreshMetrics();toast('Contacto creado');};
  const updateContact=async(id,f)=>{await API.updateContact(sel,id,f);setContacts(await API.contacts(sel));refreshMetrics();toast('Contacto actualizado');};
  const deleteContact=async(id)=>{await API.deleteContact(sel,id);setContacts(await API.contacts(sel));refreshMetrics();toast('Contacto eliminado');};
  const createDeal=async(f)=>{await API.createDeal(sel,f);const[d,mx]=await Promise.all([API.deals(sel),API.metrics(sel)]);setDeals(d);setMetrics(mx);toast('Oportunidad creada');};
  const moveDeal=async(id,stage)=>{await API.updateDeal(sel,id,{stage});const[d,mx]=await Promise.all([API.deals(sel),API.metrics(sel)]);setDeals(d);setMetrics(mx);};
  const createTask=async(f)=>{await API.createTask(sel,f);setTasks(await API.tasks(sel));toast('Tarea creada');};
  const toggleTask=async(t)=>{await API.updateTask(sel,t.id,{done:!t.done});setTasks(await API.tasks(sel));};
  const deleteTask=async(id)=>{await API.deleteTask(sel,id);setTasks(await API.tasks(sel));toast('Tarea eliminada');};
  const createCampaign=async(f)=>{await API.createCampaign(sel,f);setCampaigns(await API.campaigns(sel));toast('Campaña creada');};
  const createAutomation=async(f)=>{await API.createAutomation(sel,f);const[a,mx]=await Promise.all([API.automations(sel),API.metrics(sel)]);setAutomations(a);setMetrics(mx);toast('Automatización activada');};
  const toggleAutomation=async(a)=>{await API.updateAutomation(sel,a.id,{status:a.status==='activa'?'pausada':'activa'});setAutomations(await API.automations(sel));};
  const replyConv=async(id,text)=>{await API.replyConversation(sel,id,text);setConversations(await API.conversations(sel));};
  const readConv=async(id)=>{await API.updateConversation(sel,id,{read:true});setConversations(await API.conversations(sel));};
  const toggleConvStatus=async(c)=>{await API.updateConversation(sel,c.id,{status:c.status==='abierta'?'cerrada':'abierta'});setConversations(await API.conversations(sel));};
  const logout=()=>{setToken(null);setUser(null);};

  if(!ready) return <div className="auth-wrap"><div style={{color:'#fff',fontFamily:'var(--font-display)'}}>Cargando…</div></div>;
  if(!user) return <><AuthGate onAuth={setUser}/><ToastHost/></>;

  const selClient=clients.find(c=>c.id===sel);
  const unread=conversations.reduce((s,c)=>s+(c.unread>0?1:0),0);
  const todayStr=new Date().toISOString().slice(0,10);
  const tasksDue=tasks.filter(t=>!t.done&&t.due<=todayStr).length;
  const views=[{k:'content',l:'Parrilla'},{k:'analytics',l:'Reportes'},{k:'contacts',l:'Contactos'},{k:'pipeline',l:'Embudo'},{k:'tasks',l:'Tareas',badge:tasksDue},{k:'campaigns',l:'Campañas'},{k:'automations',l:'Automatización'},{k:'inbox',l:'Bandeja',badge:unread},{k:'messages',l:'Chat'},{k:'plan',l:'Plan'}];
  return (<div className="app">
    <aside className="sidebar">
      <div className="brand"><div className="brand-mark violet">P</div><div><div className="brand-name">Pauta&nbsp;Studio</div><div className="brand-sub">Panel agencia</div></div></div>
      <div className="nav-label">Clientes</div>
      <div className="nav" style={{gap:8}}>{clients.map(c=>(<button key={c.id} className={'client-row'+(sel===c.id?' active':'')} onClick={()=>setSel(c.id)} style={{padding:'10px 12px'}}>
        <div className="client-av" style={{width:34,height:34,fontSize:13}}>{(c.fullName||'?').split(' ').map(s=>s[0]).slice(0,2).join('')}</div>
        <div style={{flex:1,minWidth:0,textAlign:'left'}}><div style={{fontSize:13,fontWeight:600,color:'#fff',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{c.fullName}</div>
          <div style={{fontSize:11,color:'#8E8EA8'}}>{c.planUsed}/{c.planTotal} pubs</div></div>
        {c.pending>0&&<span className="nav-badge" style={{position:'static'}}>{c.pending}</span>}</button>))}</div>
      <div className="side-foot"><button className="logout-btn" onClick={logout}><Ico d={icons.out} size={15}/> Cerrar sesión</button></div>
    </aside>
    <div className="main">
      <header className="topbar"><div><h1>{selClient?.fullName||'Selecciona un cliente'}</h1><div className="crumb">{selClient?.businessSector||'Panel de gestión'}</div></div></header>
      <div className="content">
        {!sel?<Empty title="Elige un cliente" sub="Selecciónalo en la barra lateral para gestionar su contenido y CRM." ic={icons.contacts}/>:<>
          <div className="tabs" style={{marginBottom:18,flexWrap:'wrap'}}>{views.map(v=>(<button key={v.k} className={'tab'+(view===v.k?' active':'')} onClick={()=>setView(v.k)}>{v.l}{v.badge>0&&<span className="nav-badge" style={{position:'static',marginLeft:6}}>{v.badge}</span>}</button>))}</div>
          {view==='content'&&<ClientContent content={content} onCreate={createContent}/>}
          {view==='analytics'&&<Analytics metrics={metrics} content={content}/>}
          {view==='contacts'&&<Contacts contacts={contacts} onCreate={createContact} onUpdate={updateContact} onDelete={deleteContact}/>}
          {view==='pipeline'&&<Pipeline deals={deals} contacts={contacts} onCreate={createDeal} onMove={moveDeal}/>}
          {view==='tasks'&&<Tasks tasks={tasks} contacts={contacts} onCreate={createTask} onToggle={toggleTask} onDelete={deleteTask}/>}
          {view==='campaigns'&&<Campaigns campaigns={campaigns} onCreate={createCampaign}/>}
          {view==='automations'&&<Automations automations={automations} onCreate={createAutomation} onToggle={toggleAutomation}/>}
          {view==='inbox'&&<Inbox conversations={conversations} onReply={replyConv} onRead={readConv} onToggleStatus={toggleConvStatus}/>}
          {view==='messages'&&<ClientMessages messages={messages} onSend={sendMsg}/>}
          {view==='plan'&&<ClientPlan plan={plan} profile={profile} socials={socials}/>}
        </>}
      </div></div><ToastHost/></div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
