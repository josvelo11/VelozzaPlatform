/* ======================= API ======================= */
const TOKEN_KEY='crm_token';
const getToken=()=>localStorage.getItem(TOKEN_KEY);
const setToken=(t)=>t?localStorage.setItem(TOKEN_KEY,t):localStorage.removeItem(TOKEN_KEY);
async function apiFetch(path,{method='GET',body}={}){
  const res=await fetch('/api/clientes'+path,{method,headers:{'Content-Type':'application/json',...(getToken()?{Authorization:'Bearer '+getToken()}:{})},body:body?JSON.stringify(body):undefined});
  const data=await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(data.error||'Error de conexión'); return data;
}
const API={
  login:(email,password)=>apiFetch('/auth/login',{method:'POST',body:{email,password}}),
  register:(p)=>apiFetch('/auth/register',{method:'POST',body:p}),

  getProfile:()=>apiFetch('/profile'), saveProfile:(p)=>apiFetch('/profile',{method:'PUT',body:p}),

  getContent:()=>apiFetch('/content'), decide:(id,decision)=>apiFetch(`/content/${id}/decide`,{method:'POST',body:{decision}}),
  getMessages:()=>apiFetch('/messages'), sendMessage:(text)=>apiFetch('/messages',{method:'POST',body:{text}}),

  getContacts:()=>apiFetch('/contacts'), createContact:(b)=>apiFetch('/contacts',{method:'POST',body:b}),

/* ======================= GRÁFICAS (SVG propias) ======================= */
function Donut({segments,size=150,thickness=20,center}){
  const total=segments.reduce((s,x)=>s+x.value,0)||1;const r=(size-thickness)/2,c=2*Math.PI*r;let off=0;
  return <div style={{position:'relative',width:size,height:size,flex:'0 0 auto'}}>
    <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#F1F0EB" strokeWidth={thickness}/>
    {segments.map((s,i)=>{const len=c*(s.value/total);const el=<circle key={i} cx={size/2} cy={size/2} r={r} fill="none" stroke={s.color} strokeWidth={thickness} strokeLinecap="butt" strokeDasharray={`${len} ${c-len}`} strokeDashoffset={-off} style={{transition:'all .6s'}}/>;off+=len;return el;})}</svg>
    {center&&<div style={{position:'absolute',inset:0,display:'grid',placeItems:'center',textAlign:'center'}}>{center}</div>}</div>;
}
function HBars({data}){const max=Math.max(...data.map(d=>d.value),1);
  return <div>{data.map((d,i)=>(<div className="bar-track" key={i}>
    <div className="bar-label">{d.badge}{d.label}</div>
    <div className="bar-rail"><div className="bar-val-fill" style={{'--brand':d.color,width:(d.value/max*100)+'%'}}/></div>
    <div className="bar-num">{d.display??d.value}</div></div>))}</div>;
}
function LineChart({points,height=190,color='#FF6B4A'}){
  if(!points||points.length<2) return null;
  const w=560,h=height,pad=30;const vals=points.map(p=>p.value);const max=Math.max(...vals),min=Math.min(...vals);const range=(max-min)||1;
  const X=i=>pad+(i/(points.length-1))*(w-pad*2);const Y=v=>h-pad-((v-min)/range)*(h-pad*2-6);
  const pts=points.map((p,i)=>`${X(i)},${Y(p.value)}`).join(' ');
  return <svg viewBox={`0 0 ${w} ${h}`} width="100%" preserveAspectRatio="none" style={{maxHeight:height}}>
    <defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.22"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
    <polygon points={`${pad},${h-pad} ${pts} ${w-pad},${h-pad}`} fill="url(#lg)"/>
    <polyline points={pts} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
    {points.map((p,i)=><circle key={i} cx={X(i)} cy={Y(p.value)} r="3.5" fill="#fff" stroke={color} strokeWidth="2"/>)}
    {points.map((p,i)=><text key={'t'+i} x={X(i)} y={h-9} fontSize="11" fill="#9A9AAB" textAnchor="middle" fontFamily="JetBrains Mono">{p.label}</text>)}
  </svg>;
}

/* ======================= LOGIN / REGISTRO ======================= */
function AuthGate({onAuth}){
  const[mode,setMode]=useState('login');const[err,setErr]=useState('');const[busy,setBusy]=useState(false);
  const[form,setForm]=useState({email:'',password:'',fullName:'',businessSector:'',phone:''});
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const submit=async()=>{setErr('');setBusy(true);try{
    const data=mode==='login'?await API.login(form.email,form.password):await API.register({fullName:form.fullName,businessSector:form.businessSector,phone:form.phone,email:form.email,password:form.password});
    setToken(data.token);onAuth(data.user);}catch(e){setErr(e.message);}finally{setBusy(false);}};
  return (<div className="auth-wrap"><div className="auth-card">
    <div className="brand"><div className="brand-mark">P</div><div><div className="brand-name" style={{color:'var(--ink)'}}>Pauta Studio</div><div className="brand-sub" style={{color:'var(--muted)'}}>Portal del cliente</div></div></div>
    <h2>{mode==='login'?'Bienvenido de nuevo':'Crea tu cuenta'}</h2>
    <p className="sub">{mode==='login'?'Ingresa para gestionar tu negocio':'Paso 1 · Registra los datos de tu negocio'}</p>
    {err&&<div className="auth-err">{err}</div>}
    {mode==='register'&&<>
      <div className="field"><label>Nombre completo</label><input className="input" value={form.fullName} onChange={e=>set('fullName',e.target.value)} placeholder="Tu nombre y apellido"/></div>
      <div className="field"><label>Sector del negocio</label><input className="input" value={form.businessSector} onChange={e=>set('businessSector',e.target.value)} placeholder="Ej. Restaurante, Moda, Salud"/></div>
      <div className="field"><label>Teléfono</label><input className="input" value={form.phone} onChange={e=>set('phone',e.target.value)} placeholder="+57 ___ ___ ____"/></div></>}
    <div className="field"><label>Correo electrónico</label><input className="input" type="email" value={form.email} onChange={e=>set('email',e.target.value)} placeholder="tucorreo@negocio.com"/></div>
    <div className="field"><label>Contraseña</label><input className="input" type="password" value={form.password} onChange={e=>set('password',e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} placeholder="••••••••"/></div>
    <button className="btn btn-primary" style={{width:'100%',justifyContent:'center',marginTop:6}} disabled={busy} onClick={submit}>{busy?'Un momento…':(mode==='login'?'Ingresar':'Crear cuenta y continuar')}</button>
    <div className="auth-switch">{mode==='login'?'¿No tienes cuenta? ':'¿Ya tienes cuenta? '}<button onClick={()=>{setMode(mode==='login'?'register':'login');setErr('');}}>{mode==='login'?'Regístrate':'Inicia sesión'}</button></div>
    {mode==='login'&&<div className="auth-hint">Demo: <code>camila@laparrillaverde.co</code> / <code>cliente123</code></div>}
  </div></div>);
}

function MonthProjection({content,setRoute}){
  const now=new Date();
  const [cursor,setCursor]=useState({y:now.getFullYear(),m:now.getMonth()});
  const {y,m}=cursor;
  const monthNames=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const days=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  const startDow=(new Date(y,m,1).getDay()+6)%7;
  const daysInMonth=new Date(y,m+1,0).getDate();
  const todayStr=now.toISOString().slice(0,10);
  const cells=[];
  for(let i=0;i<startDow;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);
  while(cells.length%7!==0) cells.push(null);
  const byDay={};
  const monthItems=content.filter(item=>{
    const [cy,cm]=item.date.split('-').map(Number);
    return cy===y&&cm===m+1;
  }).sort((a,b)=>a.date.localeCompare(b.date));
  monthItems.forEach(item=>{
    const day=Number(item.date.split('-')[2]);
    (byDay[day]||=[]).push(item);
  });
  const nextItems=monthItems.filter(item=>item.date>=now.toISOString().slice(0,10)).slice(0,4);
  const move=(delta)=>setCursor(c=>{let nm=c.m+delta,ny=c.y;if(nm<0){nm=11;ny-=1;}if(nm>11){nm=0;ny+=1;}return {y:ny,m:nm};});
  const formatLabel=(value)=>({reel:'Reel',carrusel:'Carrusel',flyer:'Flyer'}[value]||'Flyer');
  return <div className="card card-pad">
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:12,flexWrap:'wrap',marginBottom:14}}>
      <div>
        <div className="section-title"><Ico d={icons.cal} size={16}/>Contenido proyectado del mes</div>
        <div className="section-sub">Vista clásica del calendario con las piezas programadas de cada día.</div>
      </div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
        <button className="btn btn-ghost btn-sm" onClick={()=>move(-1)}>← Mes anterior</button>
        <button className="btn btn-ghost btn-sm" onClick={()=>move(1)}>Mes siguiente →</button>
        <button className="btn btn-ghost btn-sm" onClick={()=>setRoute('content')}>Abrir parrilla completa</button>
      </div>
    </div>
    {monthItems.length?<>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:10,marginBottom:10,flexWrap:'wrap'}}>
        <div className="section-title" style={{fontSize:15}}>{monthNames[m]} {y}</div>
        <div style={{fontSize:12,color:'var(--muted)'}}>Cada bloque muestra título, formato y red social programada.</div>
      </div>
      <div className="cal">
        <div className="cal-head">{days.map(d=><div key={d}>{d}</div>)}</div>

/* ======================= ANALÍTICA / REPORTES ======================= */
function Analytics({metrics,content}){
  if(!metrics) return null;
  const reach=PKEYS.map(k=>({label:PLATFORMS[k].name,value:metrics.reachByPlatform?.[k]||0,color:PLATFORMS[k].color,display:fmtK(metrics.reachByPlatform?.[k]||0),badge:<span className="mini-badge" style={{'--brand':PLATFORMS[k].color,width:18,height:18,fontSize:9,border:'none'}}>{PLATFORMS[k].mono}</span>})).filter(r=>r.value>0);
  const cs=metrics.contentByStatus||{};
  const donut=[{label:'Aprobadas',value:cs.approved||0,color:'#19B98C'},{label:'Pendientes',value:cs.pending||0,color:'#F4A52C'},{label:'Borrador',value:cs.draft||0,color:'#9A9AAB'},{label:'Publicadas',value:cs.published||0,color:'#6C5CE7'}].filter(d=>d.value>0);
  const totalContent=donut.reduce((s,d)=>s+d.value,0);
  const lastFollowers=metrics.followerGrowth?.at(-1)?.value||0;const firstFollowers=metrics.followerGrowth?.[0]?.value||0;
  const growthPct=firstFollowers?Math.round((lastFollowers-firstFollowers)/firstFollowers*100):0;
  return (<div className="grid" style={{gap:18}}>
    <div className="kpi-row">
      <KPI lbl="Seguidores totales" val={fmtK(lastFollowers)} ico={icons.share} c="var(--violet)" bg="rgba(108,92,231,.12)" trend={`+${growthPct}% 6 meses`}/>
      <KPI lbl="Engagement promedio" val={metrics.engagementRate+'%'} ico={icons.chart} c="var(--primary)" bg="rgba(255,107,74,.12)" trend="interacción"/>
      <KPI lbl="Apertura de email" val={metrics.openRate+'%'} ico={icons.mega} c="var(--mint)" bg="rgba(25,185,140,.12)" trend="campañas"/>
      <KPI lbl="Nuevos contactos" val={metrics.newContactsThisMonth} ico={icons.contacts} c="var(--amber)" bg="rgba(244,165,44,.15)" trend="este mes"/>
    </div>
    <div className="card card-pad"><div className="section-title" style={{marginBottom:6}}><Ico d={icons.chart} size={16}/>Crecimiento de seguidores</div>
      <p className="section-sub" style={{marginBottom:12}}>Suma de tus redes conectadas, últimos 6 meses.</p>
      <LineChart points={metrics.followerGrowth} color="#FF6B4A"/></div>
    <div className="chart-grid">
      <div className="card card-pad"><div className="section-title" style={{marginBottom:16}}><Ico d={icons.share} size={16}/>Alcance por red (mensual)</div>
        {reach.length?<HBars data={reach}/>:<p style={{fontSize:13,color:'var(--muted)'}}>Conecta redes para ver alcance.</p>}</div>
      <div className="card card-pad"><div className="section-title" style={{marginBottom:16}}><Ico d={icons.grid} size={16}/>Estado del contenido</div>
        <div style={{display:'flex',justifyContent:'center'}}><Donut segments={donut.length?donut:[{label:'—',value:1,color:'#F1F0EB'}]} center={<div><div style={{fontFamily:'var(--font-display)',fontSize:26,fontWeight:600}}>{totalContent}</div><div style={{fontSize:11,color:'var(--muted)'}}>piezas</div></div>}/></div>
        <div className="legend">{donut.map((d,i)=><div className="lg" key={i}><i style={{background:d.color}}/>{d.label} ({d.value})</div>)}</div></div>
    </div></div>);
}

const INBOX_CH={instagram:[PLATFORMS.instagram.hex,'◎'],facebook:[PLATFORMS.facebook.hex,'f'],whatsapp:['#25D366','✆'],email:['#6C5CE7','✉'],x:['#111','𝕏'],tiktok:['#111','♪']};
function Inbox({conversations,onReply,onRead,onToggleStatus}){
  const[sel,setSel]=useState(null);const[text,setText]=useState('');const bodyRef=useRef(null);
  const ordered=[...conversations].sort((a,b)=>(b.unread>0)-(a.unread>0));
  const current=conversations.find(c=>c.id===sel)||ordered[0]||null;
  useEffect(()=>{if(current&&current.id!==sel)setSel(current.id);},[conversations.length]);
  useEffect(()=>{if(bodyRef.current)bodyRef.current.scrollTop=bodyRef.current.scrollHeight;},[current?.messages?.length,sel]);
  const open=(c)=>{setSel(c.id);if(c.unread>0)onRead(c.id);};
  const send=()=>{const t=text.trim();if(!t||!current)return;onReply(current.id,t);setText('');};
  return (<div className="inbox">
    <div className="inbox-list">{ordered.map(c=>{const[col,gl]=INBOX_CH[c.channel]||INBOX_CH.email;const last=c.messages[c.messages.length-1];
      return (<div key={c.id} className={'conv'+(current&&c.id===current.id?' active':'')} onClick={()=>open(c)}>
        <div className="conv-av" style={{background:avatarColor(c.contactName)}}>{initialsOf(c.contactName)}<span className="conv-ch" style={{background:col}}>{gl}</span></div>
        <div className="conv-main"><div className="conv-top"><span className="conv-name">{c.contactName}</span><span className="conv-time">{c.updatedAt}</span></div>
          <div style={{display:'flex',alignItems:'center',gap:6}}><span className="conv-prev">{last?(last.from==='me'?'Tú: ':'')+last.text:''}</span>{c.unread>0&&<span className="conv-unread">{c.unread}</span>}</div></div></div>);})}
      {!conversations.length&&<div className="inbox-empty">Sin conversaciones aún.</div>}</div>
    {current?<div className="thread">
      <div className="thread-head"><div className="conv-av" style={{background:avatarColor(current.contactName),width:38,height:38}}>{initialsOf(current.contactName)}</div>
        <div style={{flex:1}}><div style={{fontWeight:600,fontSize:14}}>{current.contactName}</div><div style={{fontSize:11.5,color:'var(--muted)',textTransform:'capitalize'}}>{current.channel} · {current.status}</div></div>
        <button className="btn btn-ghost btn-sm" onClick={()=>onToggleStatus(current)}>{current.status==='abierta'?'Cerrar':'Reabrir'}</button></div>
      <div className="thread-body" ref={bodyRef}>{current.messages.map((m,i)=>(<div key={i} className={'tmsg '+(m.from==='me'?'me':'them')}>{m.text}<div className="tm-at">{m.at}</div></div>))}</div>
      <div className="thread-input"><input className="input" placeholder="Escribe una respuesta…" value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()}/><button className="btn btn-primary" onClick={send}><Ico d={icons.send} size={16}/></button></div>
    </div>:<div className="inbox-empty">Selecciona una conversación</div>}
  </div>);
}

function Calendar({content}){
  const now=new Date();const[cursor,setCursor]=useState({y:now.getFullYear(),m:now.getMonth()});

  const cells=[];for(let i=0;i<startDow;i++)cells.push(null);for(let d=1;d<=daysInMonth;d++)cells.push(d);while(cells.length%7!==0)cells.push(null);
  const byDay={};content.forEach(c=>{const[cy,cm,cd]=c.date.split('-').map(Number);if(cy===y&&cm===m+1)(byDay[cd]||=[]).push(c);});

    <div className="cal"><div className="cal-head">{days.map(d=><div key={d}>{d}</div>)}</div><div className="cal-grid">{cells.map((d,i)=>{const ds=d?`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`:'';
      return (<div key={i} className={'cal-cell'+(d?'':' dim')+(ds===todayStr?' today':'')}>{d&&<div className="cal-num">{d}</div>}{(byDay[d]||[]).map(c=><div key={c.id} className="cal-event cal-event-rich" style={{'--brand':c.color}} title={c.title}>

        <div className="approval-info"><div className="t">{c.title}</div><div className="m">{c.caption}</div><div style={{display:'flex',gap:6,marginTop:7,alignItems:'center'}}>{c.platforms.map(p=><span key={p} className="pill pill-muted">{PLATFORMS[p].name}</span>)}<span style={{fontSize:11.5,color:'var(--muted-2)',fontFamily:'var(--font-mono)',marginLeft:4}}>Programado: {c.date}</span></div></div>
        <div className="approval-actions"><button className="btn-reject" onClick={()=>onDecide(c.id,'rejected')}>Rechazar</button><button className="btn-approve" onClick={()=>onDecide(c.id,'approved')}>Aprobar</button></div></div>)):<Empty title="Todo al día ✨" sub="No tienes piezas pendientes."/>}</div></div>
    <div className="card card-pad"><div className="section-title">Historial de decisiones</div><div className="grid" style={{gap:10,marginTop:16}}>{history.length?history.map(c=>(<div key={c.id} style={{display:'flex',alignItems:'center',gap:12,padding:'11px 0',borderBottom:'1px solid var(--line)'}}><div style={{width:8,height:34,borderRadius:5,background:c.color}}/><div style={{flex:1}}><div style={{fontWeight:600,fontSize:13.5}}>{c.title}</div><div style={{fontSize:12,color:'var(--muted)',fontFamily:'var(--font-mono)'}}>{c.date}</div></div><StatusPill s={c.status}/></div>)):<p style={{fontSize:13,color:'var(--muted)'}}>Aún no hay decisiones.</p>}</div></div></div>);
}
function Messages({messages,onSend}){
  const[text,setText]=useState('');const bodyRef=useRef(null);
  useEffect(()=>{if(bodyRef.current)bodyRef.current.scrollTop=bodyRef.current.scrollHeight;},[messages]);
  const send=()=>{const t=text.trim();if(!t)return;onSend(t);setText('');};
  return (<div className="chat" style={{maxWidth:760}}><div className="chat-head"><div className="avatar" style={{background:'linear-gradient(135deg,var(--primary),#FF9A6A)'}}>PS</div><div><div style={{fontWeight:600,fontSize:14}}>Equipo Pauta Studio</div><div style={{fontSize:12,color:'var(--mint)',display:'flex',alignItems:'center',gap:6}}><span className="dot-status" style={{background:'var(--mint)'}}/>En línea</div></div></div>
    <div className="chat-body" ref={bodyRef}>{messages.map(m=>(<div key={m.id} className={'msg '+(m.from==='client'?'me':'them')}>{m.text}<div className="meta">{m.at}</div></div>))}</div>
    <div className="chat-input"><input className="input" placeholder="Escribe un mensaje al equipo…" value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()}/><button className="btn btn-primary" onClick={send}><Ico d={icons.send} size={16}/></button></div></div>);
}
function Plan({plan}){
  if(!plan) return null;const pct=plan.used/plan.total;const R=72,C=2*Math.PI*R;
  return (<div className="grid" style={{gap:20,maxWidth:860}}>
    <div className="card card-pad"><div className="eyebrow">Suscripción activa</div><div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:12,marginTop:6}}><div><div className="section-title" style={{fontSize:19}}>{plan.name}</div><p className="section-sub">Periodo {plan.period} · se renueva el 1 del próximo mes</p></div><button className="btn btn-dark"><Ico d={icons.plus} size={15}/>Mejorar plan</button></div>
      <div className="ring-wrap" style={{marginTop:24}}><div className="ring"><svg width="168" height="168"><circle cx="84" cy="84" r={R} fill="none" stroke="#EFEEE8" strokeWidth="14"/><circle cx="84" cy="84" r={R} fill="none" stroke="var(--primary)" strokeWidth="14" strokeLinecap="round" strokeDasharray={C} strokeDashoffset={C*(1-pct)} style={{transition:'stroke-dashoffset .8s'}}/></svg><div className="ring-center"><div className="big">{plan.used}<span style={{fontSize:18,color:'var(--muted-2)'}}>/{plan.total}</span></div><div className="small">publicaciones usadas</div></div></div>
        <div className="plan-breakdown"><div style={{fontSize:13,fontWeight:600,marginBottom:4}}>Distribución por red</div>{PKEYS.map(k=>{const used=plan.perPlatform?.[k]||0,cap=plan.capPlatform?.[k]||0,w=cap?Math.round(used/cap*100):0;return (<div className="pb-row" key={k}><div className="pb-name"><span className="social-badge" style={{'--brand':PLATFORMS[k].color,width:22,height:22,fontSize:11,borderRadius:6}}>{PLATFORMS[k].mono}</span>{PLATFORMS[k].name}</div><div className="pb-bar"><div className="pb-fill" style={{'--brand':PLATFORMS[k].color,width:w+'%'}}/></div><div className="pb-num">{used}/{cap}</div></div>);})}</div></div></div>
    <div className="kpi-row" style={{gridTemplateColumns:'repeat(3,1fr)'}}>{[['Disponibles este mes',plan.total-plan.used,'restan','var(--mint)','rgba(25,185,140,.12)'],['Publicaciones del plan',plan.total,'incluidas','var(--violet)','rgba(108,92,231,.12)'],['Uso del plan',Math.round(pct*100)+'%','consumido','var(--primary)','rgba(255,107,74,.12)']].map((k,i)=>(<div className="kpi" key={i}><div className="k-ico" style={{background:k[4],color:k[3]}}><Ico d={icons.plan} size={18}/></div><div className="k-val">{k[1]}</div><div className="k-lbl">{k[0]}</div><div style={{fontSize:11.5,color:'var(--muted-2)',marginTop:4}}>{k[2]}</div></div>))}</div></div>);
}

/* ======================= APP ======================= */
const TITLES={dashboard:['Resumen','Inicio · Vista general'],analytics:['Reportes','Analítica · Rendimiento de tu negocio'],socials:['Redes sociales','Marketing · Interconecta tus cuentas'],content:['Parrilla y calendario','Marketing · Tu contenido programado'],campaigns:['Campañas','Marketing · Email y redes'],automations:['Automatizaciones','Marketing · Flujos que trabajan por ti'],approvals:['Aprobaciones','Marketing · Visto bueno de piezas'],contacts:['Contactos','CRM · Tu audiencia y leads'],pipeline:['Embudo de ventas','CRM · Oportunidades por etapa'],tasks:['Tareas','CRM · Agenda y seguimiento'],inbox:['Bandeja de entrada','Comunicación · Mensajes de tus clientes'],profile:['Mi perfil','Cuenta · Datos y redes'],messages:['Mensajes','Comunicación con tu equipo'],plan:['Mi plan','Cuenta · Publicaciones incluidas']};

function App(){
  const[user,setUser]=useState(null);const[ready,setReady]=useState(false);const[route,setRoute]=useState('dashboard');
  const[profile,setProfile]=useState(null);const[socials,setSocials]=useState(null);const[content,setContent]=useState([]);
  const[messages,setMessages]=useState([]);const[plan,setPlan]=useState(null);const[metrics,setMetrics]=useState(null);
  const[contacts,setContacts]=useState([]);const[deals,setDeals]=useState([]);const[tasks,setTasks]=useState([]);const[campaigns,setCampaigns]=useState([]);
  const[automations,setAutomations]=useState([]);const[conversations,setConversations]=useState([]);

  useEffect(()=>{(async()=>{if(getToken()){try{setUser(await API.me());}catch{setToken(null);}}setReady(true);})();},[]);
  const loadAll=async()=>{const[p,s,c,m,pl,mx,ct,dl,tk,cp,au,cv]=await Promise.all([API.getProfile(),API.getSocials(),API.getContent(),API.getMessages(),API.getPlan(),API.getMetrics(),API.getContacts(),API.getDeals(),API.getTasks(),API.getCampaigns(),API.getAutomations(),API.getConversations()]);
    setProfile(p);setSocials(s);setContent(c);setMessages(m);setPlan(pl);setMetrics(mx);setContacts(ct);setDeals(dl);setTasks(tk);setCampaigns(cp);setAutomations(au);setConversations(cv);};
  useEffect(()=>{if(user)loadAll().catch(e=>toastErr(e.message));},[user]);
  useEffect(()=>{if(!user)return;const id=setInterval(async()=>{try{const[c,m,pl,mx,cv]=await Promise.all([API.getContent(),API.getMessages(),API.getPlan(),API.getMetrics(),API.getConversations()]);setContent(c);setMessages(m);setPlan(pl);setMetrics(mx);setConversations(cv);}catch{}},6000);return()=>clearInterval(id);},[user]);

  const logout=()=>{setToken(null);setUser(null);setRoute('dashboard');};
  const refreshMetrics=async()=>{try{setMetrics(await API.getMetrics());}catch{}};
  const saveProfile=async(p)=>{setProfile(await API.saveProfile(p));};
  const toggleSocial=async(k)=>{try{setSocials(await API.toggleSocial(k));toast('Conexión actualizada');}catch(e){toastErr(e.message);}};
  const decide=async(id,d)=>{try{await API.decide(id,d);const[c,pl,mx]=await Promise.all([API.getContent(),API.getPlan(),API.getMetrics()]);setContent(c);setPlan(pl);setMetrics(mx);toast(d==='approved'?'¡Aprobada! Cuenta en tu plan':'Pieza rechazada');}catch(e){toastErr(e.message);}};
  const sendMsg=async(t)=>{try{await API.sendMessage(t);setMessages(await API.getMessages());}catch(e){toastErr(e.message);}};
  // CRM handlers
  const createContact=async(f)=>{await API.createContact(f);setContacts(await API.getContacts());refreshMetrics();toast('Contacto creado');};
  const updateContact=async(id,f)=>{await API.updateContact(id,f);setContacts(await API.getContacts());refreshMetrics();toast('Contacto actualizado');};
  const deleteContact=async(id)=>{await API.deleteContact(id);setContacts(await API.getContacts());refreshMetrics();toast('Contacto eliminado');};
  const createDeal=async(f)=>{await API.createDeal(f);const[d,mx]=await Promise.all([API.getDeals(),API.getMetrics()]);setDeals(d);setMetrics(mx);toast('Oportunidad creada');};
  const moveDeal=async(id,stage)=>{await API.updateDeal(id,{stage});const[d,mx]=await Promise.all([API.getDeals(),API.getMetrics()]);setDeals(d);setMetrics(mx);};
  const createTask=async(f)=>{await API.createTask(f);setTasks(await API.getTasks());toast('Tarea creada');};
  const toggleTask=async(t)=>{await API.updateTask(t.id,{done:!t.done});setTasks(await API.getTasks());};
  const deleteTask=async(id)=>{await API.deleteTask(id);setTasks(await API.getTasks());toast('Tarea eliminada');};
  const createCampaign=async(f)=>{await API.createCampaign(f);setCampaigns(await API.getCampaigns());toast('Campaña creada');};
  const createAutomation=async(f)=>{await API.createAutomation(f);const[a,mx]=await Promise.all([API.getAutomations(),API.getMetrics()]);setAutomations(a);setMetrics(mx);toast('Automatización activada');};
  const toggleAutomation=async(a)=>{await API.updateAutomation(a.id,{status:a.status==='activa'?'pausada':'activa'});const[au,mx]=await Promise.all([API.getAutomations(),API.getMetrics()]);setAutomations(au);setMetrics(mx);};
  const replyConv=async(id,text)=>{await API.replyConversation(id,text);setConversations(await API.getConversations());};
  const readConv=async(id)=>{await API.updateConversation(id,{read:true});setConversations(await API.getConversations());};
  const toggleConvStatus=async(c)=>{await API.updateConversation(c.id,{status:c.status==='abierta'?'cerrada':'abierta'});setConversations(await API.getConversations());};

  if(!ready) return <div className="auth-wrap"><div style={{color:'#fff',fontFamily:'var(--font-display)'}}>Cargando…</div></div>;
  if(!user) return <><AuthGate onAuth={setUser}/><ToastHost/></>;

  const pendingCount=content.filter(c=>c.status==='pending').length;
  const todayStr=new Date().toISOString().slice(0,10);
  const tasksDue=tasks.filter(t=>!t.done&&t.due<=todayStr).length;
  const unreadCount=conversations.reduce((s,c)=>s+(c.unread>0?1:0),0);
  const[t,crumb]=TITLES[route];
  return (<div className="app">
    <Sidebar route={route} setRoute={setRoute} pendingCount={pendingCount} tasksDue={tasksDue} unreadCount={unreadCount} plan={plan} onLogout={logout}/>
    <div className="main"><Topbar title={t} crumb={crumb} profile={profile} pendingCount={pendingCount} onBell={()=>setRoute('approvals')}/>
      <div className="content">
        {route==='dashboard'&&<Dashboard profile={profile} plan={plan} content={content} metrics={metrics} tasks={tasks} deals={deals} setRoute={setRoute}/>}
        {route==='analytics'&&<Analytics metrics={metrics} content={content}/>}
        {route==='socials'&&<Socials socials={socials} onToggle={toggleSocial} profile={profile}/>}
        {route==='content'&&<ContentView content={content}/>}
        {route==='campaigns'&&<Campaigns campaigns={campaigns} onCreate={createCampaign}/>}
        {route==='automations'&&<Automations automations={automations} onCreate={createAutomation} onToggle={toggleAutomation}/>}
        {route==='inbox'&&<Inbox conversations={conversations} onReply={replyConv} onRead={readConv} onToggleStatus={toggleConvStatus}/>}
        {route==='approvals'&&<Approvals content={content} onDecide={decide}/>}
        {route==='contacts'&&<Contacts contacts={contacts} onCreate={createContact} onUpdate={updateContact} onDelete={deleteContact}/>}
        {route==='pipeline'&&<Pipeline deals={deals} contacts={contacts} onCreate={createDeal} onMove={moveDeal}/>}
        {route==='tasks'&&<Tasks tasks={tasks} contacts={contacts} onCreate={createTask} onToggle={toggleTask} onDelete={deleteTask}/>}
        {route==='profile'&&<Profile profile={profile} onSave={saveProfile}/>}
        {route==='messages'&&<Messages messages={messages} onSend={sendMsg}/>}
        {route==='plan'&&<Plan plan={plan}/>}
      </div></div><ToastHost/></div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
